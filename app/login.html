<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Florería Lucy — Acceso</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#193a2c;font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
.login-box{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:20px;padding:40px 32px;width:100%;max-width:380px;text-align:center}
.login-box h1{font-family:'Playfair Display',serif;font-size:26px;color:#fff;margin-bottom:4px}
.login-box .sub{font-size:13px;color:rgba(255,255,255,.5);margin-bottom:28px}
.field{margin-bottom:14px;text-align:left}
.field label{display:block;font-size:12px;color:rgba(255,255,255,.6);margin-bottom:4px}
.field input{width:100%;padding:11px 14px;border-radius:10px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);color:#fff;font-size:14px;font-family:'Inter',sans-serif;outline:none;transition:border-color .15s}
.field input:focus{border-color:#d4a843}
.field input::placeholder{color:rgba(255,255,255,.3)}
.btn{width:100%;padding:12px;background:#d4a843;color:#1a0f08;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;margin-top:8px;transition:background .15s}
.btn:hover{background:#c9956a}
.err{color:#f87171;font-size:12px;margin-top:10px;display:none}
</style>
</head>
<body>
<div class="login-box">
  <div style="font-size:36px;margin-bottom:14px">🌸</div>
  <h1>Florería Lucy</h1>
  <div class="sub">Ingresa tus credenciales</div>
  <div class="field">
    <label>Usuario</label>
    <input type="text" id="login-user" placeholder="Tu usuario" autofocus>
  </div>
  <div class="field">
    <label>Contraseña</label>
    <input type="password" id="login-pass" placeholder="Tu contraseña" onkeydown="if(event.key==='Enter')doLogin()">
  </div>
  <button class="btn" onclick="doLogin()">Entrar</button>
  <div class="err" id="login-err"></div>
</div>
<script>
async function doLogin() {
  const username = document.getElementById('login-user').value.trim();
  const password = document.getElementById('login-pass').value;
  const err = document.getElementById('login-err');
  err.style.display = 'none';
  if (!username || !password) { err.textContent = 'Ingresa usuario y contraseña'; err.style.display = ''; return; }
  try {
    const r = await fetch('/auth/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      credentials: 'include',
      body: JSON.stringify({username, password})
    });
    if (r.ok) {
      const data = await r.json();
      location.href = data.redirect || '/panel/';
    } else {
      const data = await r.json().catch(() => ({}));
      err.textContent = data.detail || 'Error al iniciar sesión';
      err.style.display = '';
    }
  } catch(e) {
    err.textContent = 'Error de conexión';
    err.style.display = '';
  }
}
</script>
</body>
</html>
