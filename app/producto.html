<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Florería Lucy</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
:root{--verde-oscuro:#193a2c;--verde-medio:#2d5a3d;--dorado:#d4a843;--crema:#faf8f5;--texto:#1a1a1a;--texto2:#6b7280;--borde:#e5e7eb;--rojo:#ef4444}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--crema);color:var(--texto);min-height:100vh}
.header{background:var(--verde-oscuro);color:#fff;padding:14px 20px;text-align:center}
.header h1{font-family:'Playfair Display',serif;font-size:20px;font-weight:600}
.header a{color:#fff;text-decoration:none}
.container{max-width:480px;margin:0 auto;padding:16px}
.prod-img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:16px;background:var(--borde)}
.prod-img.img-tall{object-fit:contain}
.prod-gallery{position:relative;border-radius:16px;overflow:hidden;margin-bottom:4px}
.prod-gallery-scroll{display:flex;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.prod-gallery-scroll::-webkit-scrollbar{display:none}
.prod-gallery-scroll img{flex:0 0 100%;scroll-snap-align:start;width:100%;aspect-ratio:1;object-fit:cover;background:var(--borde)}
.prod-gallery-scroll img.img-tall{object-fit:contain}
.prod-gallery-dots{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);display:flex;gap:6px}
.prod-gallery-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.5);transition:background .2s}
.prod-gallery-dot.active{background:#fff}
.prod-name{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;margin:16px 0 4px}
.prod-cat{font-size:13px;color:var(--texto2);margin-bottom:8px}
.prod-price{font-size:28px;font-weight:700;color:var(--verde-medio);margin-bottom:4px}
.prod-price-old{font-size:16px;color:#999;text-decoration:line-through;margin-left:8px;font-weight:400}
.prod-desc{font-size:14px;color:var(--texto);line-height:1.6;margin:12px 0}
.prod-dims{font-size:13px;color:var(--texto2);margin-bottom:8px}
.prod-tags{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0}
.prod-tag{font-size:11px;color:var(--verde-medio);background:rgba(45,90,61,.08);padding:4px 10px;border-radius:12px}
.btn-wa{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;background:#25d366;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;margin-top:16px}
.btn-catalogo{display:block;text-align:center;margin-top:12px;color:var(--verde-medio);font-size:14px;font-weight:500;text-decoration:none}
.agotado-tag{display:inline-block;background:var(--rojo);color:#fff;font-size:12px;font-weight:700;padding:4px 12px;border-radius:6px;margin-bottom:8px}
.error-screen{text-align:center;padding:60px 20px}
.error-screen .icon{font-size:48px;margin-bottom:12px}
.loading{text-align:center;padding:60px 20px}
.spinner{width:32px;height:32px;border:3px solid var(--borde);border-top-color:var(--verde-medio);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="header"><a href="/catalogo/"><h1>Florería Lucy</h1></a></div>
<div class="container" id="main">
  <div class="loading"><div class="spinner"></div><p>Cargando producto...</p></div>
</div>
<script>
const API = '';
const WHATSAPP = '5216143349392';
const params = new URLSearchParams(window.location.search);
const prodId = params.get('id');

async function load() {
  if (!prodId) { showError('Producto no especificado'); return; }
  try {
    const r = await fetch(`${API}/catalogo/producto/${prodId}`);
    if (!r.ok) { showError('Producto no encontrado'); return; }
    const p = await r.json();
    document.title = `${p.nombre} — Florería Lucy`;
    render(p);
  } catch(e) { showError('Error al cargar'); }
}

let _selVar = null; // variante seleccionada

function render(p) {
  const precio = p.precio_descuento && p.precio_descuento < p.precio ? p.precio_descuento : p.precio;
  const hasDiscount = p.precio_descuento && p.precio_descuento < p.precio;
  let tagsHtml = '';
  if (p.etiquetas) {
    try {
      const tags = JSON.parse(p.etiquetas);
      if (Array.isArray(tags) && tags.length) tagsHtml = `<div class="prod-tags">${tags.map(t=>`<span class="prod-tag">#${t}</span>`).join('')}</div>`;
    } catch(e) {}
  }
  const tieneVar = p.variantes && p.variantes.length > 0;
  document.getElementById('main').innerHTML = `
    ${renderProdGallery(p)}
    ${p.sin_stock ? '<div class="agotado-tag">Agotado</div>' : ''}
    ${p.destacado ? '<div style="display:inline-block;background:var(--dorado);color:var(--verde-oscuro);font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;margin-bottom:8px">★ Destacado</div>' : ''}
    <div class="prod-name">${esc(p.nombre)}</div>
    <div class="prod-cat">${esc(p.categoria)}</div>
    <div class="prod-price" id="prod-price-display">$${(precio/100).toLocaleString()}${hasDiscount ? `<span class="prod-price-old">$${(p.precio/100).toLocaleString()}</span>` : ''}</div>
    ${p.dimensiones ? `<div class="prod-dims">📐 ${p.dimensiones}</div>` : ''}
    ${(p.medida_alto||p.medida_ancho) ? `<div class="prod-dims">📐 ${p.medida_alto?p.medida_alto+' cm alto':''}${p.medida_alto&&p.medida_ancho?' × ':''}${p.medida_ancho?p.medida_ancho+' cm ancho':''}</div>` : ''}
    ${tagsHtml}
    ${p.descripcion ? `<div class="prod-desc">${esc(p.descripcion)}</div>` : ''}
    ${tieneVar ? `<div id="prod-variantes" style="margin:14px 0">${renderVariantes(p)}</div>` : ''}
    ${!p.sin_stock ? `<button class="btn-wa" id="btn-add" style="background:var(--verde-oscuro)" onclick="agregarAlCarrito()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
      Agregar al carrito
    </button>` : ''}
    <a class="btn-catalogo" id="btn-cart-link" href="/catalogo/?openCart=1" style="display:none;background:var(--dorado);color:var(--verde-oscuro);padding:12px;border-radius:12px;font-weight:600;margin-top:10px">🛒 Ver carrito (<span id="btn-cart-count">0</span>)</a>
    <a class="btn-catalogo" href="#" onclick="volverCatalogo();return false">← Volver al catálogo</a>
  `;
  window._prod = p;
  refreshCartLink();
}

function renderVariantes(p) {
  const grupos = {};
  p.variantes.forEach(v => { if (!grupos[v.tipo]) grupos[v.tipo] = []; grupos[v.tipo].push(v); });
  let html = `<div style="font-size:13px;font-weight:600;color:var(--texto);margin-bottom:8px">Selecciona una opción <span style="color:var(--rojo)">*</span></div>`;
  for (const [tipo, vars] of Object.entries(grupos)) {
    html += `<div style="font-size:11px;font-weight:600;color:var(--texto2);margin-bottom:6px;text-transform:uppercase">${esc(tipo)}</div>`;
    html += `<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px">`;
    vars.forEach(v => {
      const precioStr = v.precio && v.precio > 0 && v.precio !== p.precio ? ` · $${(v.precio/100).toLocaleString()}` : '';
      html += `<button data-vid="${v.id}" onclick="elegirVariante(${v.id})" style="padding:8px 16px;border:1.5px solid var(--borde);border-radius:10px;background:#fff;font-size:13px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif">${esc(v.nombre)}${precioStr}</button>`;
    });
    html += `</div>`;
  }
  return html;
}

function elegirVariante(vid) {
  const p = window._prod;
  const v = p.variantes.find(x => x.id === vid);
  if (!v) return;
  _selVar = v;
  // resaltar la seleccionada
  document.querySelectorAll('#prod-variantes button[data-vid]').forEach(b => {
    if (parseInt(b.dataset.vid) === vid) {
      b.style.borderColor = 'var(--verde-oscuro)';
      b.style.background = 'var(--verde-oscuro)';
      b.style.color = '#fff';
    } else {
      b.style.borderColor = 'var(--borde)';
      b.style.background = '#fff';
      b.style.color = 'var(--texto)';
    }
  });
  // actualizar precio si la variante tiene precio propio
  if (v.precio && v.precio > 0) {
    const disp = document.getElementById('prod-price-display');
    if (disp) disp.textContent = '$' + (v.precio/100).toLocaleString();
  }
  // actualizar imagen si la variante tiene foto propia
  swapMainImage(v.imagen_url || p.imagen_url);
}

function swapMainImage(url) {
  if (!url) return;
  // Caso 1: galería con scroll horizontal — reemplazar la primera imagen
  const galleryFirst = document.querySelector('.prod-gallery-scroll img');
  if (galleryFirst) {
    galleryFirst.src = url;
    galleryFirst.classList.remove('img-tall');
    galleryFirst.onload = function() { autoFitImg(this); };
    // scroll al inicio para mostrar la nueva imagen
    const scroll = document.querySelector('.prod-gallery-scroll');
    if (scroll) scroll.scrollTo({left: 0, behavior: 'smooth'});
    return;
  }
  // Caso 2: imagen única — reemplazar el src
  const single = document.querySelector('img.prod-img');
  if (single) {
    single.src = url;
    single.classList.remove('img-tall');
    single.onload = function() { autoFitImg(this); };
  }
}

function refreshCartLink() {
  try {
    const cart = JSON.parse(sessionStorage.getItem('lucy_cart') || '[]');
    const count = cart.reduce((s, it) => s + (it.qty || 1), 0);
    const link = document.getElementById('btn-cart-link');
    const cnt = document.getElementById('btn-cart-count');
    if (link && cnt) {
      cnt.textContent = count;
      link.style.display = count > 0 ? 'block' : 'none';
    }
  } catch(e) {}
}

function showToastInline(msg) {
  const t = document.createElement('div');
  t.textContent = msg;
  t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#193a2c;color:#fff;padding:12px 24px;border-radius:10px;font-size:14px;font-weight:500;z-index:200;box-shadow:0 4px 16px rgba(0,0,0,.2)';
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2000);
}

function agregarAlCarrito() {
  const p = window._prod;
  if (!p) return;
  if (p.sin_stock) {
    showToastInline('Producto agotado');
    return;
  }
  const tieneVar = p.variantes && p.variantes.length > 0;
  if (tieneVar && !_selVar) {
    showToastInline('Selecciona una opción primero');
    const wrap = document.getElementById('prod-variantes');
    if (wrap) { wrap.style.transition='background .3s'; wrap.style.background='#fef3c7'; setTimeout(()=>{wrap.style.background='';}, 600); wrap.scrollIntoView({behavior:'smooth',block:'center'}); }
    return;
  }
  // En web SÍ se bloquea cuando no hay stock (a diferencia del POS, donde
  // se permite vender en negativo). El cliente web no puede esperar.
  if (_selVar && _selVar.stock_activo && (_selVar.stock || 0) <= 0) {
    showToastInline(`"${_selVar.nombre}" agotado`);
    return;
  }
  // Escribir directo al carrito de sessionStorage (mismo storage que usa catalogo.html)
  const cart = JSON.parse(sessionStorage.getItem('lucy_cart') || '[]');
  const varId = _selVar ? _selVar.id : null;
  const existing = cart.find(x => x.id === p.id && (x.variante_id || null) === varId);
  if (existing) {
    existing.qty = (existing.qty || 1) + 1;
  } else {
    // Calcular precio efectivo (variante puede sobreescribir el base)
    let precioEf = p.precio;
    let precioDescEf = p.precio_descuento;
    if (_selVar && _selVar.precio && _selVar.precio > 0) {
      precioEf = _selVar.precio;
      precioDescEf = (_selVar.precio_descuento && _selVar.precio_descuento > 0) ? _selVar.precio_descuento : null;
    }
    const item = {
      id: p.id, nombre: p.nombre,
      precio: precioEf, precio_descuento: precioDescEf,
      // Display strings — el carrito de catalogo.html los espera ya formateados
      precio_display: '$' + Math.round(precioEf/100).toLocaleString(),
      precio_descuento_display: precioDescEf ? '$' + Math.round(precioDescEf/100).toLocaleString() : null,
      imagen_url: p.imagen_url, categoria: p.categoria, qty: 1,
      variantes: p.variantes || null,
    };
    if (_selVar) {
      item.variante_id = _selVar.id;
      item.variante_nombre = _selVar.nombre;
    }
    cart.push(item);
  }
  sessionStorage.setItem('lucy_cart', JSON.stringify(cart));
  showToastInline('✓ Agregado al carrito');
  refreshCartLink();
}

function showError(msg) {
  document.getElementById('main').innerHTML = `<div class="error-screen"><div class="icon">😕</div><h2>${msg}</h2><a class="btn-catalogo" href="/catalogo/">Ver catálogo completo →</a></div>`;
}

function volverCatalogo() {
  // Si vienen del mismo dominio (catalogo) volver atrás; si no, ir al catálogo
  const ref = document.referrer;
  let mismoOrigin = false;
  try {
    if (ref) mismoOrigin = new URL(ref).origin === window.location.origin;
  } catch(e) {}
  if (mismoOrigin && history.length > 1) {
    history.back();
  } else {
    window.location.href = '/catalogo/';
  }
}

function esc(s) { const d = document.createElement('div'); d.textContent = s||''; return d.innerHTML; }
function cldUrl(url, w) {
  if (!url) return url;
  if (url.includes('?')) return url;
  if (!url.includes('/upload/')) return url;
  if (/\/upload\/[^/]*f_auto/.test(url)) return url;
  return url.replace('/upload/', `/upload/f_auto,q_auto,w_${w}/`);
}
function altProd(p) { return `${p.nombre || 'Arreglo floral'} - ${p.categoria || ''} Floreria Lucy Chihuahua`.replace(/\s+/g,' ').trim(); }

function autoFitImg(img) { if (img.naturalHeight > img.naturalWidth) img.classList.add('img-tall'); }

function renderProdGallery(p) {
  if (!p.imagen_url) return '';
  const extras = p.imagenes_extra || [];
  const altText = esc(altProd(p));
  if (!extras.length) {
    return `<img class="prod-img" src="${cldUrl(p.imagen_url, 800)}" alt="${altText}" fetchpriority="high" onload="autoFitImg(this)">`;
  }
  const allImgs = [p.imagen_url, ...extras];
  const dots = allImgs.map((_, i) => `<div class="prod-gallery-dot${i===0?' active':''}"></div>`).join('');
  return `<div class="prod-gallery">
    <div class="prod-gallery-scroll" onscroll="updateProdDots(this)">
      ${allImgs.map((url, i) => `<img src="${cldUrl(url, 800)}" alt="${altText}"${i===0 ? ' fetchpriority="high"' : ' loading="lazy"'} onload="autoFitImg(this)">`).join('')}
    </div>
    <div class="prod-gallery-dots">${dots}</div>
  </div>`;
}

function updateProdDots(scrollEl) {
  const dots = scrollEl.parentElement.querySelectorAll('.prod-gallery-dot');
  const idx = Math.round(scrollEl.scrollLeft / scrollEl.offsetWidth);
  dots.forEach((d, i) => d.classList.toggle('active', i === idx));
}

load();
</script>
</body>
</html>
