<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Florería Lucy</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
:root{--verde-oscuro:#193a2c;--verde-medio:#2d5a3d;--dorado:#d4a843;--crema:#faf8f5;--texto:#1a1a1a;--texto2:#6b7280;--borde:#e5e7eb;--rojo:#ef4444}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--crema);color:var(--texto);min-height:100vh}
.header{background:var(--verde-oscuro);color:#fff;padding:14px 20px;text-align:center}
.header h1{font-family:'Playfair Display',serif;font-size:20px;font-weight:600}
.header a{color:#fff;text-decoration:none}
.container{max-width:480px;margin:0 auto;padding:16px}
.prod-img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:16px;background:var(--borde)}
.prod-name{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;margin:16px 0 4px}
.prod-cat{font-size:13px;color:var(--texto2);margin-bottom:8px}
.prod-price{font-size:28px;font-weight:700;color:var(--verde-medio);margin-bottom:4px}
.prod-price-old{font-size:16px;color:#999;text-decoration:line-through;margin-left:8px;font-weight:400}
.prod-desc{font-size:14px;color:var(--texto);line-height:1.6;margin:12px 0}
.prod-dims{font-size:13px;color:var(--texto2);margin-bottom:8px}
.prod-tags{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0}
.prod-tag{font-size:11px;color:var(--verde-medio);background:rgba(45,90,61,.08);padding:4px 10px;border-radius:12px}
.btn-wa{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;background:#25d366;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;margin-top:16px}
.btn-catalogo{display:block;text-align:center;margin-top:12px;color:var(--verde-medio);font-size:14px;font-weight:500;text-decoration:none}
.agotado-tag{display:inline-block;background:var(--rojo);color:#fff;font-size:12px;font-weight:700;padding:4px 12px;border-radius:6px;margin-bottom:8px}
.error-screen{text-align:center;padding:60px 20px}
.error-screen .icon{font-size:48px;margin-bottom:12px}
.loading{text-align:center;padding:60px 20px}
.spinner{width:32px;height:32px;border:3px solid var(--borde);border-top-color:var(--verde-medio);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="header"><a href="/catalogo/"><h1>Florería Lucy</h1></a></div>
<div class="container" id="main">
  <div class="loading"><div class="spinner"></div><p>Cargando producto...</p></div>
</div>
<script>
const API = '';
const WHATSAPP = '5216143349392';
const params = new URLSearchParams(window.location.search);
const prodId = params.get('id');

async function load() {
  if (!prodId) { showError('Producto no especificado'); return; }
  try {
    const r = await fetch(`${API}/catalogo/producto/${prodId}`);
    if (!r.ok) { showError('Producto no encontrado'); return; }
    const p = await r.json();
    document.title = `${p.nombre} — Florería Lucy`;
    render(p);
  } catch(e) { showError('Error al cargar'); }
}

function render(p) {
  const precio = p.precio_descuento && p.precio_descuento < p.precio ? p.precio_descuento : p.precio;
  const hasDiscount = p.precio_descuento && p.precio_descuento < p.precio;
  let tagsHtml = '';
  if (p.etiquetas) {
    try {
      const tags = JSON.parse(p.etiquetas);
      if (Array.isArray(tags) && tags.length) tagsHtml = `<div class="prod-tags">${tags.map(t=>`<span class="prod-tag">#${t}</span>`).join('')}</div>`;
    } catch(e) {}
  }
  document.getElementById('main').innerHTML = `
    ${p.imagen_url ? `<img class="prod-img" src="${p.imagen_url}" alt="${esc(p.nombre)}">` : ''}
    ${p.sin_stock ? '<div class="agotado-tag">Agotado</div>' : ''}
    ${p.destacado ? '<div style="display:inline-block;background:var(--dorado);color:var(--verde-oscuro);font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;margin-bottom:8px">★ Destacado</div>' : ''}
    <div class="prod-name">${esc(p.nombre)}</div>
    <div class="prod-cat">${esc(p.categoria)}</div>
    <div class="prod-price">$${(precio/100).toLocaleString()}${hasDiscount ? `<span class="prod-price-old">$${(p.precio/100).toLocaleString()}</span>` : ''}</div>
    ${p.dimensiones ? `<div class="prod-dims">📐 ${p.dimensiones}</div>` : ''}
    ${(p.medida_alto||p.medida_ancho) ? `<div class="prod-dims">📐 ${p.medida_alto?p.medida_alto+' cm alto':''}${p.medida_alto&&p.medida_ancho?' × ':''}${p.medida_ancho?p.medida_ancho+' cm ancho':''}</div>` : ''}
    ${tagsHtml}
    ${p.descripcion ? `<div class="prod-desc">${esc(p.descripcion)}</div>` : ''}
    ${!p.sin_stock ? `<button class="btn-wa" style="background:var(--verde-oscuro)" onclick="agregarAlCarrito()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
      Agregar al carrito
    </button>` : ''}
    <a class="btn-catalogo" href="/catalogo/">Ver catalogo completo →</a>
  `;
  window._prod = p;
}

function agregarAlCarrito() {
  const p = window._prod;
  if (!p) return;
  // Save to localStorage so catalogo.html can pick it up
  const pending = JSON.parse(localStorage.getItem('fl_add_to_cart') || '[]');
  pending.push({id: p.id, nombre: p.nombre, precio: p.precio, precio_descuento: p.precio_descuento, imagen_url: p.imagen_url, categoria: p.categoria});
  localStorage.setItem('fl_add_to_cart', JSON.stringify(pending));
  // Redirect to catalog in classic mode
  window.location.href = '/catalogo/?modo=classic&added=' + p.id;
}

function showError(msg) {
  document.getElementById('main').innerHTML = `<div class="error-screen"><div class="icon">😕</div><h2>${msg}</h2><a class="btn-catalogo" href="/catalogo/">Ver catálogo completo →</a></div>`;
}

function esc(s) { const d = document.createElement('div'); d.textContent = s||''; return d.innerHTML; }

load();
</script>
</body>
</html>
