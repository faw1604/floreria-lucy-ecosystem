<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Repartidor — Floreria Lucy</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--verde:#193a2c;--verde-m:#2d5a3d;--crema:#faf8f5;--blanco:#fff;--texto:#1a1a1a;--texto2:#5a5a5a;--borde:#e5e0d8;--rojo:#dc3545;--naranja:#f59e0b;--dorado:#d4a843;--morada:#7c3aed;--azul:#2563eb;--verde-c:#16a34a}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--crema);color:var(--texto);font-family:'Inter',sans-serif;min-height:100vh}

/* Header */
.hdr{position:fixed;top:0;left:0;right:0;z-index:50;background:var(--verde);color:#fff;padding:14px 16px}
.hdr-title{font-size:16px;font-weight:600}
.hdr-sub{font-size:12px;opacity:.8;margin-top:2px}

/* Views */
.view{display:none;padding:70px 12px 100px;max-width:480px;margin:0 auto}
.view.active{display:block}

/* Login */
.login-box{max-width:320px;margin:80px auto;text-align:center}
.login-box h2{font-size:20px;font-weight:700;color:var(--verde);margin-bottom:4px}
.login-box p{font-size:13px;color:var(--texto2);margin-bottom:20px}
.login-input{width:100%;padding:14px;border:1px solid var(--borde);border-radius:10px;font-size:15px;font-family:inherit;margin-bottom:12px}
.login-input:focus{outline:none;border-color:var(--verde)}
.login-btn{width:100%;padding:14px;background:var(--verde);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;min-height:48px}
.login-btn:active{background:var(--verde-m)}
.login-err{color:var(--rojo);font-size:13px;margin-top:8px;display:none}

/* Card */
.card{background:var(--blanco);border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:0 1px 6px rgba(0,0,0,.06);border-left:4px solid var(--borde);position:relative;transition:all .4s}
.card.zona-morada{border-left-color:var(--morada)}
.card.zona-azul{border-left-color:var(--azul)}
.card.zona-verde{border-left-color:var(--verde-c)}
.card.entregado{opacity:.5;background:#f0fdf4}
.card.fallido{border-left-color:var(--rojo);background:#fff5f5}
.card-check{position:absolute;top:12px;right:12px;width:24px;height:24px;accent-color:var(--verde)}
.badge{font-size:10px;font-weight:600;padding:3px 8px;border-radius:6px;display:inline-block;margin-right:4px;margin-bottom:6px}
.badge-manana{background:#fef3c7;color:#92400e}
.badge-tarde{background:#fed7aa;color:#9a3412}
.badge-noche{background:#e9d5ff;color:#6b21a8}
.badge-zona{color:#fff;font-size:10px}
.badge-zona-morada{background:var(--morada)}
.badge-zona-azul{background:var(--azul)}
.badge-zona-verde{background:var(--verde-c)}
.card-name{font-size:16px;font-weight:700;margin-bottom:4px}
.card-detail{font-size:13px;color:var(--texto2);margin-bottom:3px}
.card-detail a{color:var(--verde);text-decoration:none}
.card-dedi{font-style:italic;font-size:12px;background:#fef9e7;padding:6px 8px;border-radius:6px;margin:6px 0;color:#92400e}
.card-notas{font-size:12px;color:var(--texto2);margin:4px 0}
.card-pago{font-size:13px;font-weight:600;margin-top:6px}
.card-items{font-size:11px;color:var(--texto2);margin-top:4px}
.card-banner{font-size:11px;font-weight:600;padding:6px 8px;border-radius:6px;margin-top:8px}
.banner-ok{background:#dcfce7;color:#166534}
.banner-fail{background:#fee2e2;color:#991b1b}

/* Action buttons */
.card-actions{display:flex;gap:8px;margin-top:10px}
.abtn{flex:1;padding:12px;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;min-height:48px;display:flex;align-items:center;justify-content:center;gap:4px}
.abtn:active{transform:scale(.97)}
.abtn-ok{background:var(--verde-c);color:#fff}
.abtn-fail{background:var(--rojo);color:#fff}
.abtn-confirm{background:var(--verde);color:#fff;margin-top:8px}

/* Photo preview */
.foto-preview{display:flex;align-items:center;gap:8px;margin-top:8px}
.foto-preview img{width:80px;height:80px;object-fit:cover;border-radius:8px}
.foto-preview .abtn{flex:none;width:auto;padding:10px 16px}

/* Bottom bar */
.bottom-bar{position:fixed;bottom:0;left:0;right:0;z-index:60;background:var(--blanco);border-top:1px solid var(--borde);padding:10px 12px;display:flex;gap:8px}
.bottom-bar .abtn{font-size:13px}
.bbtn-maps{background:var(--blanco);color:var(--verde);border:1px solid var(--verde)}
.bbtn-ruta{background:var(--verde);color:#fff}
.bbtn-ruta:disabled{opacity:.4;cursor:not-allowed}

/* Modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center}
.modal-bg.active{display:flex}
.modal{background:var(--blanco);border-radius:16px;padding:20px;width:90%;max-width:400px;max-height:80vh;overflow-y:auto}
.modal h3{font-size:16px;font-weight:600;margin-bottom:12px;color:var(--verde)}
.modal-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.chip{padding:8px 12px;border:1px solid var(--borde);border-radius:20px;font-size:12px;cursor:pointer;font-family:inherit;background:var(--blanco)}
.chip:hover,.chip.active{background:var(--verde);color:#fff;border-color:var(--verde)}
.modal textarea{width:100%;padding:10px;border:1px solid var(--borde);border-radius:8px;font-size:13px;font-family:inherit;min-height:60px;margin-bottom:12px}
.modal textarea:focus{outline:none;border-color:var(--verde)}
.modal-btns{display:flex;gap:8px}
.modal-btns .abtn{font-size:13px}
.mbtn-cancel{background:var(--blanco);color:var(--texto);border:1px solid var(--borde)}
.mbtn-danger{background:var(--rojo);color:#fff}

/* Summary */
.summary{text-align:center;padding:40px 20px}
.summary h2{font-size:22px;font-weight:700;color:var(--verde);margin-bottom:20px}
.summary-row{font-size:16px;margin-bottom:8px}
.summary-fail{margin-top:20px;text-align:left}
.summary-fail-item{font-size:13px;padding:8px;background:#fff5f5;border-radius:8px;margin-bottom:6px}

.err-msg{color:var(--rojo);font-size:12px;margin-top:4px;display:none}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid #fff;border-top-color:transparent;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- STATE A: Login -->
<div class="view active" id="v-login">
  <div class="login-box">
    <h2>Repartidor</h2>
    <p>Floreria Lucy</p>
    <input class="login-input" type="password" id="login-pw" placeholder="Contrasena" autocomplete="current-password">
    <button class="login-btn" id="login-btn">Entrar</button>
    <div class="login-err" id="login-err">Contrasena incorrecta</div>
  </div>
</div>

<!-- STATE B: Select orders -->
<div class="view" id="v-select">
  <div class="hdr">
    <div class="hdr-title">Repartidor — Floreria Lucy</div>
    <div class="hdr-sub" id="hdr-select-sub"></div>
  </div>
  <div id="select-list"></div>
  <div class="bottom-bar">
    <button class="abtn bbtn-maps" id="btn-maps" onclick="abrirMaps()">📍 Ver en Maps</button>
    <button class="abtn bbtn-ruta" id="btn-ruta" disabled onclick="confirmarRuta()">🚚 INICIAR RUTA (0)</button>
  </div>
</div>

<!-- STATE C: En camino -->
<div class="view" id="v-camino">
  <div class="hdr">
    <div class="hdr-title">Repartidor — Floreria Lucy</div>
    <div class="hdr-sub" id="hdr-camino-sub"></div>
  </div>
  <div id="camino-list"></div>
</div>

<!-- STATE D: Summary -->
<div class="view" id="v-summary">
  <div class="hdr">
    <div class="hdr-title">Repartidor — Floreria Lucy</div>
    <div class="hdr-sub">Resumen del dia</div>
  </div>
  <div id="summary-body"></div>
</div>

<!-- Modal: confirm route -->
<div class="modal-bg" id="modal-ruta" onclick="if(event.target===this)this.classList.remove('active')">
  <div class="modal">
    <h3 id="modal-ruta-title">Iniciar ruta?</h3>
    <div class="modal-btns">
      <button class="abtn mbtn-cancel" onclick="document.getElementById('modal-ruta').classList.remove('active')">Cancelar</button>
      <button class="abtn abtn-ok" onclick="iniciarRuta()">Si, salir</button>
    </div>
  </div>
</div>

<!-- Modal: no entrega -->
<div class="modal-bg" id="modal-noentrega" onclick="if(event.target===this)this.classList.remove('active')">
  <div class="modal">
    <h3>Que paso?</h3>
    <div class="modal-chips">
      <span class="chip" onclick="selChip(this)">No habia nadie</span>
      <span class="chip" onclick="selChip(this)">Direccion incorrecta</span>
      <span class="chip" onclick="selChip(this)">Perro suelto</span>
      <span class="chip" onclick="selChip(this)">Rechazo el pedido</span>
      <span class="chip" onclick="selChip(this)">Otro</span>
    </div>
    <textarea id="ne-motivo" placeholder="Detalle del motivo..."></textarea>
    <div class="modal-btns">
      <button class="abtn mbtn-cancel" onclick="cerrarNoEntrega()">Cancelar</button>
      <button class="abtn mbtn-danger" id="ne-submit">Registrar</button>
    </div>
  </div>
</div>

<script>
let allPedidos = [];
let selected = new Set();
let currentNoEntregaId = null;
let currentState = 'login';

function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('v-' + id).classList.add('active');
  currentState = id;
}

function todayStr() {
  return new Date().toLocaleDateString('es-MX', {timeZone:'America/Chihuahua', weekday:'long', day:'numeric', month:'long'});
}

function zonaClass(z) {
  const zl = (z||'').toLowerCase();
  if (zl.includes('morada')) return 'zona-morada';
  if (zl.includes('azul')) return 'zona-azul';
  if (zl.includes('verde')) return 'zona-verde';
  return '';
}

function horarioBadge(h) {
  const hl = (h||'').toLowerCase();
  if (hl.includes('mañana')||hl.includes('manana')) return '<span class="badge badge-manana">Manana</span>';
  if (hl.includes('tarde')) return '<span class="badge badge-tarde">Tarde</span>';
  if (hl.includes('noche')) return '<span class="badge badge-noche">Noche</span>';
  return '';
}

function zonaBadge(z) {
  const zl = (z||'').toLowerCase();
  let cls = '';
  if (zl.includes('morada')) cls = 'badge-zona-morada';
  else if (zl.includes('azul')) cls = 'badge-zona-azul';
  else if (zl.includes('verde')) cls = 'badge-zona-verde';
  return cls ? `<span class="badge badge-zona ${cls}">${z}</span>` : '';
}

function telLink(t) {
  if (!t) return '';
  const digits = t.replace(/\D/g,'');
  const num = digits.length === 10 ? '52' + digits : digits;
  return `<a href="tel:${num}">📞 ${t}</a>`;
}

// ─── Login ───
document.getElementById('login-btn').addEventListener('click', doLogin);
document.getElementById('login-pw').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

async function doLogin() {
  const pw = document.getElementById('login-pw').value;
  try {
    const r = await fetch('/auth/login', {
      method:'POST', headers:{'Content-Type':'application/json'}, credentials:'include',
      body: JSON.stringify({password: pw})
    });
    if (r.ok) {
      loadEntregas();
    } else {
      document.getElementById('login-err').style.display = '';
    }
  } catch(e) {
    document.getElementById('login-err').textContent = 'Error de conexion';
    document.getElementById('login-err').style.display = '';
  }
}

// ─── Check session on load ───
async function checkSession() {
  try {
    const r = await fetch('/repartidor/entregas-hoy', {credentials:'include'});
    if (r.ok) {
      allPedidos = await r.json();
      decideView();
    }
  } catch(e) {}
}

function decideView() {
  const listos = allPedidos.filter(p => p.estado === 'Listo');
  const enCamino = allPedidos.filter(p => p.estado === 'En camino');
  if (enCamino.length > 0) {
    renderCamino();
    showView('camino');
  } else if (listos.length > 0) {
    renderSelect();
    showView('select');
  } else {
    renderSummary();
    showView('summary');
  }
}

// ─── Load data ───
async function loadEntregas() {
  try {
    const r = await fetch('/repartidor/entregas-hoy', {credentials:'include'});
    if (r.status === 401) { showView('login'); return; }
    if (!r.ok) return;
    allPedidos = await r.json();
    decideView();
  } catch(e) {}
}

// ─── STATE B: Select ───
function renderSelect() {
  const listos = allPedidos.filter(p => p.estado === 'Listo');
  document.getElementById('hdr-select-sub').textContent = `${todayStr()}  ·  ${listos.length} pendientes`;
  let html = '';
  if (!listos.length) {
    html = '<div style="text-align:center;padding:40px;color:var(--texto2)">No hay pedidos listos</div>';
  }
  for (const p of listos) {
    const checked = selected.has(p.id) ? 'checked' : '';
    html += `<div class="card ${zonaClass(p.zona_envio)}">
      <input type="checkbox" class="card-check" ${checked} onchange="toggleSel(${p.id},this.checked)">
      <div style="font-size:18px;font-weight:700;color:var(--verde);margin-bottom:6px">${p.folio}</div>
      <div>${horarioBadge(p.horario_entrega)}${zonaBadge(p.zona_envio)}</div>
      <div class="card-detail" style="font-weight:600">Entrega a: ${p.nombre_destinatario||''}</div>
      <div class="card-detail">Tel: ${telLink(p.telefono_destinatario)}</div>
      <div class="card-detail">${p.direccion_entrega||''}</div>
      ${p.dedicatoria ? `<div class="card-dedi">"${p.dedicatoria}"</div>` : ''}
      ${p.notas_entrega ? `<div class="card-notas">${p.notas_entrega}</div>` : ''}
      ${p.items.length ? `<div class="card-items">${p.items.join(', ')}</div>` : ''}
    </div>`;
  }
  document.getElementById('select-list').innerHTML = html;
  updateBottomBar();
}

function toggleSel(id, checked) {
  if (checked) selected.add(id); else selected.delete(id);
  updateBottomBar();
}

function updateBottomBar() {
  const n = selected.size;
  const btn = document.getElementById('btn-ruta');
  btn.disabled = n === 0;
  btn.textContent = `🚚 INICIAR RUTA (${n})`;
}

function abrirMaps() {
  const listos = allPedidos.filter(p => selected.has(p.id) && p.direccion_entrega);
  if (!listos.length) { alert('Selecciona pedidos con direccion'); return; }
  const dirs = listos.map(p => encodeURIComponent((p.direccion_entrega||'') + ', Chihuahua, Chih., Mexico'));
  const last = dirs.pop();
  let url = `https://www.google.com/maps/dir/?api=1&destination=${last}`;
  if (dirs.length) url += `&waypoints=${dirs.join('|')}`;
  window.open(url, '_blank');
}

function confirmarRuta() {
  const n = selected.size;
  document.getElementById('modal-ruta-title').textContent = `Iniciar ruta con ${n} pedido${n>1?'s':''}?`;
  document.getElementById('modal-ruta').classList.add('active');
}

async function iniciarRuta() {
  document.getElementById('modal-ruta').classList.remove('active');
  try {
    const r = await fetch('/repartidor/iniciar-ruta', {
      method:'POST', headers:{'Content-Type':'application/json'}, credentials:'include',
      body: JSON.stringify({pedido_ids: [...selected]})
    });
    if (!r.ok) { alert('Error al iniciar ruta'); return; }
    selected.clear();
    await loadEntregas();
  } catch(e) { alert('Error de conexion'); }
}

// ─── STATE C: En camino ───
function renderCamino() {
  const enCamino = allPedidos.filter(p => p.estado === 'En camino');
  const entregados = allPedidos.filter(p => p.estado === 'Entregado' || p.estado === 'entregado');
  const fallidos = allPedidos.filter(p => p.estado === 'intento_fallido');
  const pendientes = enCamino.length;
  document.getElementById('hdr-camino-sub').textContent = `En camino · ${pendientes} entrega${pendientes!==1?'s':''}`;

  let html = '';
  for (const p of enCamino) {
    html += `<div class="card ${zonaClass(p.zona_envio)}" id="card-${p.id}">
      <div style="font-size:18px;font-weight:700;color:var(--verde);margin-bottom:6px">${p.folio}</div>
      <div>${horarioBadge(p.horario_entrega)}${zonaBadge(p.zona_envio)}</div>
      <div class="card-detail" style="font-weight:600">Entrega a: ${p.nombre_destinatario||''}</div>
      <div class="card-detail">Tel: ${telLink(p.telefono_destinatario)}</div>
      <div class="card-detail">${p.direccion_entrega||''}</div>
      ${p.dedicatoria ? `<div class="card-dedi">"${p.dedicatoria}"</div>` : ''}
      ${p.notas_entrega ? `<div class="card-notas">${p.notas_entrega}</div>` : ''}
      ${p.items.length ? `<div class="card-items">${p.items.join(', ')}</div>` : ''}
      <input type="file" accept="image/*" capture="environment" id="foto-${p.id}" style="display:none" onchange="onFoto(${p.id},this)">
      <div id="preview-${p.id}"></div>
      <div class="err-msg" id="err-${p.id}"></div>
      <div class="card-actions" id="actions-${p.id}">
        <button class="abtn abtn-ok" onclick="document.getElementById('foto-${p.id}').click()">✅ Entregado</button>
        <button class="abtn abtn-fail" onclick="abrirNoEntrega(${p.id})">❌ No pude</button>
      </div>
    </div>`;
  }

  // Show delivered
  for (const p of entregados) {
    html += `<div class="card entregado">
      <div class="card-name">${p.nombre_destinatario||''} — ${p.folio}</div>
      <div class="card-banner banner-ok">✅ Entregado</div>
    </div>`;
  }

  // Show failed
  for (const p of fallidos) {
    html += `<div class="card fallido">
      <div class="card-name">${p.nombre_destinatario||''} — ${p.folio}</div>
      <div class="card-banner banner-fail">⚠️ Intento fallido: ${p.nota_no_entrega||''}</div>
    </div>`;
  }

  document.getElementById('camino-list').innerHTML = html;

  if (pendientes === 0) {
    renderSummary();
    showView('summary');
  }
}

function onFoto(id, input) {
  if (!input.files.length) return;
  const file = input.files[0];
  const url = URL.createObjectURL(file);
  document.getElementById('preview-' + id).innerHTML = `
    <div class="foto-preview">
      <img src="${url}">
      <button class="abtn abtn-confirm" onclick="confirmarEntrega(${id})">Confirmar ✓</button>
    </div>`;
  document.getElementById('actions-' + id).style.display = 'none';
}

async function confirmarEntrega(id) {
  const input = document.getElementById('foto-' + id);
  if (!input.files.length) return;
  const preview = document.getElementById('preview-' + id);
  preview.innerHTML = '<div style="text-align:center;padding:12px"><span class="spinner"></span> Subiendo foto...</div>';
  const errEl = document.getElementById('err-' + id);
  errEl.style.display = 'none';

  const fd = new FormData();
  fd.append('foto', input.files[0]);
  try {
    const r = await fetch(`/repartidor/entregar/${id}`, {method:'POST', credentials:'include', body: fd});
    if (!r.ok) {
      const d = await r.json().catch(()=>({}));
      errEl.textContent = d.detail || 'Error al entregar';
      errEl.style.display = '';
      preview.innerHTML = '';
      document.getElementById('actions-' + id).style.display = '';
      return;
    }
    // Success — reload
    await loadEntregas();
  } catch(e) {
    errEl.textContent = 'Error de conexion';
    errEl.style.display = '';
    preview.innerHTML = '';
    document.getElementById('actions-' + id).style.display = '';
  }
}

// ─── No entrega ───
function abrirNoEntrega(id) {
  currentNoEntregaId = id;
  document.getElementById('ne-motivo').value = '';
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  document.getElementById('modal-noentrega').classList.add('active');
}

function cerrarNoEntrega() {
  document.getElementById('modal-noentrega').classList.remove('active');
}

function selChip(el) {
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('ne-motivo').value = el.textContent;
}

document.getElementById('ne-submit').addEventListener('click', async () => {
  const motivo = document.getElementById('ne-motivo').value.trim();
  if (!motivo) return;
  try {
    const r = await fetch(`/repartidor/no-entrega/${currentNoEntregaId}`, {
      method:'POST', headers:{'Content-Type':'application/json'}, credentials:'include',
      body: JSON.stringify({motivo})
    });
    if (!r.ok) { alert('Error al registrar'); return; }
    cerrarNoEntrega();
    await loadEntregas();
  } catch(e) { alert('Error de conexion'); }
});

// ─── STATE D: Summary ───
function renderSummary() {
  const entregados = allPedidos.filter(p => p.estado === 'Entregado' || p.estado === 'entregado');
  const fallidos = allPedidos.filter(p => p.estado === 'intento_fallido');
  let html = `<div class="summary">
    <h2>✅ Listo por hoy!</h2>
    <div class="summary-row">Entregados: ${entregados.length} ✅</div>
    <div class="summary-row">Intentos fallidos: ${fallidos.length} ⚠️</div>`;
  if (fallidos.length) {
    html += '<div class="summary-fail">';
    for (const p of fallidos) {
      html += `<div class="summary-fail-item"><strong>${p.folio}</strong> — ${p.nombre_destinatario||''}<br><span style="color:var(--texto2)">${p.nota_no_entrega||''}</span></div>`;
    }
    html += '</div>';
  }
  html += `<button class="abtn" style="margin-top:24px;background:var(--verde);color:#fff;width:100%" onclick="verHistorial()">← Ver historial del dia</button>`;
  html += '</div>';
  document.getElementById('summary-body').innerHTML = html;
}

function verHistorial() {
  // Show all orders read-only in camino view
  renderCamino();
  showView('camino');
}

// ─── Polling ───
setInterval(() => {
  if (currentState === 'select' || currentState === 'camino') loadEntregas();
}, 60000);

// ─── Init ───
checkSession();
</script>
