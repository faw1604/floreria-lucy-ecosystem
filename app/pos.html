<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POS — Floreria Lucy</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root{--verde:#193a2c;--verde-m:#2d5a3d;--crema:#faf8f5;--blanco:#fff;--texto:#1a1a1a;--texto2:#5a5a5a;--borde:#e5e0d8;--rojo:#dc3545;--dorado:#d4a843}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--crema);color:var(--texto);font-family:'Inter',sans-serif;height:100vh;overflow:hidden}

/* Header */
.pos-header{background:var(--verde);color:#fff;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;height:52px}
.pos-logo{font-size:16px;font-weight:600}
.pos-tabs{display:flex;gap:4px}
.pos-tab{padding:6px 14px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:rgba(255,255,255,.15);color:#fff;font-family:inherit}
.pos-tab.active{background:var(--dorado);color:var(--verde)}
.pos-right{display:flex;align-items:center;gap:12px}
.pos-cliente-btn{padding:6px 12px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid rgba(255,255,255,.3);background:none;color:#fff;font-family:inherit}
.pos-cliente-btn:hover{border-color:#fff}
.pos-link{color:rgba(255,255,255,.7);text-decoration:none;font-size:12px}
.badge-desc{background:var(--dorado);color:var(--verde);font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;margin-left:6px}

/* Layout */
.pos-body{display:flex;height:calc(100vh - 52px)}
.pos-catalog{flex:0 0 65%;padding:16px;overflow-y:auto}
.pos-cart{flex:0 0 35%;background:var(--blanco);border-left:1px solid var(--borde);display:flex;flex-direction:column;overflow:hidden}

/* Catalog */
.cat-search{display:flex;gap:8px;margin-bottom:12px}
.cat-search input{flex:1;padding:10px 12px;border:1px solid var(--borde);border-radius:8px;font-size:13px;font-family:inherit}
.cat-search input:focus{outline:none;border-color:var(--verde)}
.cat-search select{padding:10px;border:1px solid var(--borde);border-radius:8px;font-size:12px;font-family:inherit;background:var(--blanco)}
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
@media(max-width:1024px){.cat-grid{grid-template-columns:repeat(2,1fr)}}
.cat-card{background:var(--blanco);border-radius:10px;overflow:hidden;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.06);transition:transform .1s}
.cat-card:active{transform:scale(.97)}
.cat-card.no-stock{opacity:.5;cursor:not-allowed;position:relative}
.cat-card.no-stock::after{content:'Sin stock';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.3);color:#fff;font-weight:600;font-size:13px}
.cat-img{width:100%;aspect-ratio:1;object-fit:cover}
.cat-info{padding:8px 10px}
.cat-name{font-size:12px;font-weight:500;line-height:1.3;height:2.6em;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.cat-price{font-size:13px;font-weight:700;color:var(--verde);margin-top:4px}
.cat-price-old{text-decoration:line-through;color:var(--texto2);font-weight:400;font-size:11px;margin-right:4px}

/* Cart */
.cart-scroll{flex:1;overflow-y:auto;padding:16px}
.cart-section{margin-bottom:16px}
.cart-section-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--texto2);margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--borde)}
.cart-empty{text-align:center;padding:30px;color:var(--texto2);font-size:13px}
.cart-item{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--borde);font-size:13px}
.cart-item:last-child{border-bottom:none}
.cart-item-name{flex:1;font-weight:500}
.cart-item-qty{display:flex;align-items:center;gap:4px}
.cart-item-qty button{width:24px;height:24px;border:1px solid var(--borde);border-radius:4px;background:var(--blanco);cursor:pointer;font-size:12px;font-weight:600}
.cart-item-qty button:hover{border-color:var(--verde)}
.cart-item-qty span{width:20px;text-align:center;font-weight:600;font-size:12px}
.cart-item-price{font-weight:600;min-width:60px;text-align:right}
.cart-item-del{background:none;border:none;color:var(--rojo);cursor:pointer;font-size:14px;padding:2px}

/* Form fields */
.f-row{margin-bottom:10px}
.f-label{font-size:11px;font-weight:600;color:var(--texto2);margin-bottom:4px;text-transform:uppercase}
.f-input{width:100%;padding:8px 10px;border:1px solid var(--borde);border-radius:6px;font-size:13px;font-family:inherit}
.f-input:focus{outline:none;border-color:var(--verde)}
.f-textarea{width:100%;padding:8px 10px;border:1px solid var(--borde);border-radius:6px;font-size:12px;font-family:inherit;min-height:50px;resize:vertical}
.f-textarea:focus{outline:none;border-color:var(--verde)}
.f-row-inline{display:flex;gap:6px}
.f-btn{padding:6px 12px;border:1px solid var(--verde);border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;background:var(--blanco);color:var(--verde)}
.f-btn:hover{background:var(--verde);color:#fff}
.f-btn.active{background:var(--verde);color:#fff}
.f-chip{padding:6px 10px;border:1px solid var(--borde);border-radius:14px;font-size:11px;font-weight:500;cursor:pointer;font-family:inherit;background:var(--blanco);color:var(--texto)}
.f-chip.active{background:var(--verde);color:#fff;border-color:var(--verde)}
.f-badge{display:inline-block;background:var(--verde);color:var(--dorado);font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px;margin-left:6px}
.f-warn{background:#fee2e2;color:#991b1b;font-size:11px;padding:6px 8px;border-radius:6px;margin:6px 0}
.f-input.f-error,.f-textarea.f-error{border-color:var(--rojo)!important}
.f-err{color:var(--rojo);font-size:11px;margin-top:2px}

/* Totals */
.cart-totals{padding:0 16px;font-size:13px}
.cart-total-row{display:flex;justify-content:space-between;padding:3px 0}
.cart-total-row.discount{color:var(--dorado);font-weight:600}
.cart-total-row.grand{font-size:16px;font-weight:700;color:var(--verde);padding:8px 0;border-top:2px solid var(--verde);margin-top:4px}

/* Payment chips */
.pay-chips{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.pay-input{display:flex;align-items:center;gap:6px;margin-bottom:6px;font-size:12px}
.pay-input input{width:90px;padding:6px 8px;border:1px solid var(--borde);border-radius:6px;font-size:12px;font-family:inherit;text-align:right}
.pay-status{font-size:12px;font-weight:600;padding:4px 0}
.pay-status.ok{color:#16a34a}
.pay-status.pending{color:var(--rojo)}

/* Bottom actions */
.cart-actions{padding:12px 16px;border-top:1px solid var(--borde);display:flex;gap:8px}
.cart-actions button{flex:1;padding:12px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;min-height:44px}
.btn-save{background:var(--blanco);color:var(--verde);border:1px solid var(--verde)}
.btn-save:hover{background:var(--crema)}
.btn-finish{background:var(--verde);color:#fff;border:none}
.btn-finish:hover{background:var(--verde-m)}

/* Modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center}
.modal-bg.active{display:flex}
.modal{background:var(--blanco);border-radius:14px;padding:20px;width:90%;max-width:440px;max-height:80vh;overflow-y:auto}
.modal h3{font-size:15px;font-weight:600;margin-bottom:12px;color:var(--verde)}
.modal-results{max-height:250px;overflow-y:auto}
.modal-item{padding:10px;border-bottom:1px solid var(--borde);cursor:pointer;font-size:13px}
.modal-item:hover{background:var(--crema)}
.modal-btns{display:flex;gap:8px;margin-top:12px}
.modal-btns button{flex:1;padding:10px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}

/* Drawer */
.drawer-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:80}
.drawer-bg.active{display:block}
.drawer{position:fixed;top:0;right:0;bottom:0;width:420px;max-width:90vw;background:var(--blanco);z-index:90;box-shadow:-4px 0 20px rgba(0,0,0,.1);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s}
.drawer.active{transform:translateX(0)}
.drawer-hdr{padding:14px 16px;background:var(--verde);color:#fff;display:flex;justify-content:space-between;align-items:center}
.drawer-hdr h3{font-size:15px;font-weight:600}
.drawer-close{background:none;border:none;color:#fff;font-size:20px;cursor:pointer}
.drawer-tabs{display:flex;border-bottom:1px solid var(--borde)}
.drawer-tab{flex:1;padding:10px;text-align:center;font-size:12px;font-weight:600;cursor:pointer;background:none;border:none;font-family:inherit;color:var(--texto2);border-bottom:2px solid transparent}
.drawer-tab.active{color:var(--verde);border-bottom-color:var(--verde)}
.drawer-body{flex:1;overflow-y:auto;padding:12px}
.dw-card{background:var(--crema);border-radius:8px;padding:10px;margin-bottom:8px;font-size:12px}
.dw-card-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.dw-card-folio{font-weight:700;color:var(--verde);font-size:14px}
.dw-card-total{font-weight:700;font-size:14px}
.dw-card-items{color:var(--texto2);margin:4px 0}
.dw-card-pago{font-size:11px;color:var(--texto2)}
.dw-card-actions{display:flex;gap:4px;margin-top:6px}
.dw-card-actions button{padding:6px 10px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;border:none}
.dw-btn-fin{background:var(--verde);color:#fff}
.dw-btn-edit{background:var(--blanco);color:var(--verde);border:1px solid var(--verde)!important}
.dw-btn-print{background:var(--blanco);color:var(--texto);border:1px solid var(--borde)!important}
.dw-resumen{background:var(--crema);border-radius:8px;padding:12px;margin-top:12px;font-size:13px}
.dw-resumen h4{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;color:var(--texto2)}
.dw-resumen-row{display:flex;justify-content:space-between;padding:3px 0}
.dw-resumen-total{font-weight:700;font-size:15px;color:var(--verde);border-top:2px solid var(--verde);padding-top:6px;margin-top:6px}

/* Print */
#print-frame{display:none}
@media print{
  body *{visibility:hidden!important;position:absolute!important;height:0!important;overflow:hidden!important}
  #print-frame{visibility:visible!important;position:static!important;height:auto!important;overflow:visible!important;display:block!important}
  #print-frame *{visibility:visible!important;position:static!important;height:auto!important}
  @page{size:80mm auto;margin:3mm}
  #print-frame{font-family:'Courier New',monospace;font-size:10pt;width:74mm;color:#000;line-height:1.4}
  #print-frame .tline{text-align:center}
  #print-frame .sep{border-top:1px dashed #000;margin:4px 0}
  #print-frame .dsep{border-top:2px solid #000;margin:4px 0}
}
</style>
</head>
<body>

<div class="pos-header">
  <div style="display:flex;align-items:center;gap:16px">
    <span class="pos-logo">🌸 Floreria Lucy</span>
    <div class="pos-tabs">
      <button class="pos-tab active" onclick="setModo('mostrador')">Mostrador</button>
      <button class="pos-tab" onclick="setModo('domicilio')">Domicilio / Recoger</button>
      <button class="pos-tab" onclick="setModo('funeral')">Funeral</button>
    </div>
  </div>
  <div class="pos-right">
    <button class="pos-cliente-btn" onclick="abrirDrawer()" style="background:rgba(255,255,255,.1)">📋 Pedidos del dia</button>
    <button class="pos-cliente-btn" id="btn-cliente" onclick="abrirBuscarCliente()">👤 Sin cliente</button>
    <a class="pos-link" href="/panel/">← Panel</a>
  </div>
</div>

<div class="pos-body">
  <!-- LEFT: Catalog -->
  <div class="pos-catalog">
    <div class="cat-search">
      <input type="text" id="cat-q" placeholder="Buscar producto..." oninput="buscarProductos()">
      <select id="cat-cat" onchange="buscarProductos()"><option value="">Todas las categorias</option></select>
    </div>
    <div class="cat-grid" id="cat-grid"></div>
  </div>

  <!-- RIGHT: Cart -->
  <div class="pos-cart">
    <div class="cart-scroll" id="cart-scroll"></div>
    <div class="cart-totals" id="cart-totals"></div>
    <div class="cart-actions">
      <button class="btn-save" onclick="guardarPedido()">Guardar pedido</button>
      <button class="btn-finish" onclick="finalizarVenta()">✓ Finalizar venta</button>
    </div>
  </div>
</div>

<!-- Modal: Search client -->
<div class="modal-bg" id="modal-cliente" onclick="if(event.target===this)this.classList.remove('active')">
  <div class="modal">
    <h3>Buscar cliente</h3>
    <input class="f-input" id="cliente-q" placeholder="Nombre, telefono o codigo..." oninput="buscarClientes()">
    <div class="modal-results" id="cliente-results"></div>
    <div class="modal-btns">
      <button style="background:var(--blanco);border:1px solid var(--borde);color:var(--texto)" onclick="document.getElementById('modal-cliente').classList.remove('active')">Cancelar</button>
      <button style="background:var(--verde);border:none;color:#fff" onclick="abrirRegistrarCliente()">+ Nuevo cliente</button>
    </div>
  </div>
</div>

<!-- Modal: Register client -->
<div class="modal-bg" id="modal-registro" onclick="if(event.target===this)this.classList.remove('active')">
  <div class="modal">
    <h3>Registrar cliente</h3>
    <div class="f-row"><div class="f-label">Nombre</div><input class="f-input" id="reg-nombre"></div>
    <div class="f-row"><div class="f-label">Telefono</div><input class="f-input" id="reg-tel" placeholder="614..."></div>
    <div class="f-row"><div class="f-label">Email (opcional)</div><input class="f-input" id="reg-email" type="email"></div>
    <div id="reg-err" style="color:var(--rojo);font-size:12px;display:none"></div>
    <div class="modal-btns">
      <button style="background:var(--blanco);border:1px solid var(--borde);color:var(--texto)" onclick="document.getElementById('modal-registro').classList.remove('active')">Cancelar</button>
      <button style="background:var(--verde);border:none;color:#fff" onclick="registrarCliente()">Guardar cliente</button>
    </div>
  </div>
</div>

<!-- Modal: Pedido creado -->
<div class="modal-bg" id="modal-creado">
  <div class="modal" style="max-width:380px;text-align:center;position:relative;padding-top:28px">
    <button onclick="cerrarModalCreado()" style="position:absolute;top:12px;right:12px;width:36px;height:36px;min-width:36px;background:transparent;border:none;cursor:pointer;font-size:22px;color:var(--texto2);display:flex;align-items:center;justify-content:center;z-index:1">&times;</button>
    <div id="creado-folio" style="font-size:22px;font-weight:700;color:var(--verde);margin:8px 0 12px"></div>
    <div id="creado-cliente" style="font-size:13px;color:var(--texto2);margin-bottom:10px"></div>
    <div id="creado-desglose" style="font-size:13px;text-align:left;background:var(--crema);padding:12px;border-radius:8px;margin-bottom:16px"></div>
    <div style="display:flex;flex-direction:column;gap:8px">
      <!-- TODO: reemplazar con QZ Tray para impresión directa sin diálogo -->
      <button onclick="imprimirDesdeModal()" style="padding:12px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;background:var(--verde);color:#fff;border:none;min-height:44px">🖨 Imprimir ticket</button>
      <button onclick="compartirWhatsApp()" id="btn-wa" style="display:none;padding:12px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;background:#25D366;color:#fff;border:none;min-height:44px">💬 Enviar por WhatsApp</button>
      <div id="wa-note" style="display:none;font-size:11px;margin-top:4px"></div>
    </div>
  </div>
</div>

<!-- Drawer: Pedidos del dia -->
<div class="drawer-bg" id="drawer-bg" onclick="cerrarDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-hdr"><h3>Pedidos del dia</h3><button class="drawer-close" onclick="cerrarDrawer()">&times;</button></div>
  <div class="drawer-tabs">
    <button class="drawer-tab active" onclick="setDrawerTab('pendientes',this)">Pendientes (<span id="dw-cnt-pend">0</span>)</button>
    <button class="drawer-tab" onclick="setDrawerTab('finalizados',this)">Finalizados (<span id="dw-cnt-fin">0</span>)</button>
  </div>
  <div class="drawer-body" id="drawer-body"></div>
</div>

<!-- Modal: Finalizar pendiente -->
<div class="modal-bg" id="modal-fin-pend" onclick="if(event.target===this)this.classList.remove('active')">
  <div class="modal">
    <h3>Finalizar pedido <span id="fin-pend-folio"></span></h3>
    <div class="cart-section-title" style="margin-bottom:8px">Metodos de pago</div>
    <div id="fin-pend-pays"></div>
    <div id="fin-pend-total" style="font-weight:700;margin:8px 0"></div>
    <div id="fin-pend-err" style="color:var(--rojo);font-size:12px;display:none"></div>
    <div class="modal-btns">
      <button style="background:var(--blanco);border:1px solid var(--borde);color:var(--texto)" onclick="document.getElementById('modal-fin-pend').classList.remove('active')">Cancelar</button>
      <button style="background:var(--verde);border:none;color:#fff" onclick="confirmarFinPend()">Finalizar</button>
    </div>
  </div>
</div>

<!-- Modal: Editar pedido -->
<div class="modal-bg" id="modal-editar" onclick="if(event.target===this)this.classList.remove('active')">
  <div class="modal">
    <h3>Editar pedido <span id="edit-folio"></span></h3>
    <div class="f-row"><div class="f-label">Nombre destinatario</div><input class="f-input" id="edit-dest-nombre"></div>
    <div class="f-row"><div class="f-label">Telefono destinatario</div><input class="f-input" id="edit-dest-tel"></div>
    <div class="f-row"><div class="f-label">Direccion entrega</div><input class="f-input" id="edit-dir"></div>
    <div class="f-row"><div class="f-label">Dedicatoria</div><textarea class="f-textarea" id="edit-dedi"></textarea></div>
    <div class="f-row"><div class="f-label">Notas</div><textarea class="f-textarea" id="edit-notas"></textarea></div>
    <div class="f-row"><div class="f-label">Horario entrega</div><input class="f-input" id="edit-horario"></div>
    <div class="f-row"><div class="f-label">Hora exacta</div><input class="f-input" id="edit-hora" type="time"></div>
    <div id="edit-err" style="color:var(--rojo);font-size:12px;display:none"></div>
    <div class="modal-btns">
      <button style="background:var(--blanco);border:1px solid var(--borde);color:var(--texto)" onclick="document.getElementById('modal-editar').classList.remove('active')">Cancelar</button>
      <button style="background:var(--verde);border:none;color:#fff" onclick="guardarEdicion()">Guardar</button>
    </div>
  </div>
</div>

<div id="print-frame"></div>

<script>
// ─── State ───
let modo = 'mostrador'; // mostrador | domicilio | recoger | funeral
let carrito = []; // [{producto_id, nombre, precio, cantidad, categoria}]
let clienteSel = null; // {id, nombre, telefono, primera_compra}
let categorias = [];
let direccionVerificada = false;
let rutaAsignada = null;
let geoLat = null, geoLng = null;

// Descuentos
// Per-item: [{idx, tipo:'%'|'$', valor, monto_centavos}]
// Total: [{label, tipo:'%'|'$', valor, monto_centavos, auto:bool}]
let descuentosItem = [];
let descuentosTotal = [];

// ─── Mode ───
function setModo(m) {
  modo = m;
  document.querySelectorAll('.pos-tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  if (m === 'mostrador') { clienteSel = null; updateClienteBtn(); }
  renderCart();
}

// ─── Catalog ───
async function loadCategorias() {
  try {
    const r = await fetch('/pos/productos/categorias', {credentials:'include'});
    if (r.status === 401) { window.location.href = '/panel/'; return; }
    if (!r.ok) return;
    categorias = await r.json();
    const sel = document.getElementById('cat-cat');
    sel.innerHTML = '<option value="">Todas las categorias</option>' +
      categorias.map(c => `<option value="${c.categoria}">${c.categoria} (${c.count})</option>`).join('');
  } catch(e) {}
}

async function buscarProductos() {
  const q = document.getElementById('cat-q').value;
  const cat = document.getElementById('cat-cat').value;
  try {
    const params = new URLSearchParams();
    if (q) params.set('q', q);
    if (cat) params.set('categoria', cat);
    const r = await fetch(`/pos/productos?${params}`, {credentials:'include'});
    if (!r.ok) return;
    const prods = await r.json();
    document.getElementById('cat-grid').innerHTML = prods.map(p => {
      const noStock = !p.disponible_hoy;
      const precio = p.precio_descuento && p.precio_descuento < p.precio
        ? `<span class="cat-price-old">$${p.precio/100}</span>$${p.precio_descuento/100}`
        : `$${p.precio/100}`;
      return `<div class="cat-card ${noStock?'no-stock':''}" ${noStock?'':`onclick="addToCart(${p.id},'${p.nombre.replace(/'/g,"\\'")}',${p.precio_descuento||p.precio},'${(p.categoria||'').replace(/'/g,"\\''")}')"`}>
        <img class="cat-img" src="${p.imagen_url}" alt="${p.nombre}" loading="lazy">
        <div class="cat-info"><div class="cat-name">${p.nombre}</div><div class="cat-price">${precio}</div></div>
      </div>`;
    }).join('') || '<div class="cart-empty">Sin productos</div>';
  } catch(e) {}
}

function addToCart(id, nombre, precio, categoria) {
  const existing = carrito.find(i => i.producto_id === id);
  if (existing) { existing.cantidad++; }
  else { carrito.push({producto_id: id, nombre, precio, cantidad: 1, categoria}); }
  renderCart();
}

function changeQty(idx, delta) {
  carrito[idx].cantidad += delta;
  if (carrito[idx].cantidad <= 0) carrito.splice(idx, 1);
  renderCart();
}

function removeItem(idx) {
  carrito.splice(idx, 1);
  descuentosItem = descuentosItem.filter(d => d.idx !== idx).map(d => ({...d, idx: d.idx > idx ? d.idx - 1 : d.idx}));
  renderCart();
}

// ─── Cart render ───
function renderCart() {
  const scroll = document.getElementById('cart-scroll');
  let html = '';

  // Items
  html += '<div class="cart-section"><div class="cart-section-title">Productos</div>';
  if (!carrito.length) {
    html += '<div class="cart-empty">Selecciona productos del catalogo</div>';
  } else {
    // Funeral validation
    if (modo === 'funeral') {
      const nonFuneral = carrito.filter(i => i.categoria.toLowerCase() !== 'funeral');
      if (nonFuneral.length) html += '<div class="f-warn">⚠ Solo productos de funeral permitidos en este modo</div>';
    }
    carrito.forEach((item, idx) => {
      const di = descuentosItem.find(d => d.idx === idx);
      const precioOriginal = item.precio * item.cantidad;
      const precioFinal = di ? precioOriginal - di.monto_centavos : precioOriginal;
      html += `<div class="cart-item">
        <div class="cart-item-name">${item.nombre}${di ? `<div style="font-size:10px;color:var(--dorado)">Desc: -$${di.monto_centavos/100} <button class="cart-item-del" onclick="quitarDescItem(${idx})" style="font-size:10px">×</button></div>` : ''}</div>
        <div class="cart-item-qty">
          <button onclick="changeQty(${idx},-1)">−</button>
          <span>${item.cantidad}</span>
          <button onclick="changeQty(${idx},1)">+</button>
        </div>
        <div class="cart-item-price">${di ? `<span style="text-decoration:line-through;color:var(--texto2);font-size:11px">$${precioOriginal/100}</span> $${precioFinal/100}` : `$${precioOriginal/100}`}</div>
        <button class="cart-item-del" onclick="removeItem(${idx})">×</button>
      </div>`;
    });
  }
  html += '</div>';

  // Discounts section
  if (carrito.length) {
    html += '<div class="cart-section"><div class="cart-section-title">Descuentos</div>';
    // Existing total discounts
    descuentosTotal.forEach((d, i) => {
      html += `<div style="font-size:12px;color:var(--dorado);margin-bottom:4px;display:flex;justify-content:space-between;align-items:center"><span>${d.label}: -$${d.monto_centavos/100}</span><button class="cart-item-del" onclick="quitarDescTotal(${i})" style="font-size:11px">×</button></div>`;
    });
    // Add per-item discount
    html += `<div style="font-size:11px;font-weight:600;margin:6px 0 4px;color:var(--texto2)">Sobre producto:</div>`;
    html += `<div class="f-row-inline" style="gap:4px;align-items:center;flex-wrap:wrap">
      <select class="f-input" id="desc-item-sel" style="width:auto;flex:1;font-size:11px;padding:6px">${carrito.map((it,i) => `<option value="${i}">${it.nombre}</option>`).join('')}</select>
      <select class="f-input" id="desc-item-tipo" style="width:50px;font-size:11px;padding:6px"><option value="%">%</option><option value="$">$</option></select>
      <input class="f-input" id="desc-item-val" type="number" placeholder="0" style="width:60px;font-size:11px;padding:6px">
      <button class="f-btn" onclick="aplicarDescItem()" style="font-size:11px;padding:5px 8px">Aplicar</button>
    </div>`;
    // Add total discount
    html += `<div style="font-size:11px;font-weight:600;margin:8px 0 4px;color:var(--texto2)">Sobre total:</div>`;
    html += `<div class="f-row-inline" style="gap:4px;align-items:center">
      <select class="f-input" id="desc-total-tipo" style="width:50px;font-size:11px;padding:6px"><option value="%">%</option><option value="$">$</option></select>
      <input class="f-input" id="desc-total-val" type="number" placeholder="0" style="width:60px;font-size:11px;padding:6px">
      <button class="f-btn" onclick="aplicarDescTotal()" style="font-size:11px;padding:5px 8px">Aplicar</button>
    </div>`;

  }

  // Client section (domicilio/funeral)
  if (modo === 'domicilio' || modo === 'funeral') {
    html += '<div class="cart-section"><div class="cart-section-title">Cliente</div>';
    if (clienteSel) {

      html += ` <button class="f-btn" onclick="abrirBuscarCliente()" style="margin-left:8px">Cambiar</button></div>`;
      const yaTieneDesc = descuentosTotal.some(d => d.auto);
      if (clienteSel.primera_compra && !yaTieneDesc) {
        html += `<button class="f-btn" onclick="aplicarPrimeraCompra()" style="margin-top:6px;color:var(--dorado);border-color:var(--dorado)">Aplicar 10% primera compra</button>`;
      }

      html += `<button class="f-btn" onclick="abrirBuscarCliente()" style="width:100%;border-style:dashed;padding:12px">Seleccionar o registrar cliente</button>`;
    }

  }

  // Delivery section (domicilio only, non-funeral)
  if (modo === 'domicilio') {
    html += '<div class="cart-section"><div class="cart-section-title">Entrega</div>';
    html += `<div class="f-row"><div class="f-label">Nombre de quien recibe</div><input class="f-input" id="f-dest-nombre" placeholder="Nombre completo"></div>`;
    html += `<div class="f-row"><div class="f-label">Telefono</div><input class="f-input" id="f-dest-tel" placeholder="614..."></div>`;
    html += `<div class="f-row"><div class="f-label">Direccion de entrega</div>
      <div class="f-row-inline"><input class="f-input" id="f-dir" placeholder="Calle y numero, colonia" style="flex:1">
      <button class="f-btn" onclick="verificarDir()">📍 Verificar</button></div></div>`;
    html += `<div class="f-row"><label style="font-size:12px;display:flex;align-items:center;gap:6px">
      <input type="checkbox" id="f-dir-ok" onchange="onDirVerificada()"> ✓ Direccion verificada</label>
      <span id="geo-ruta-badge">${rutaAsignada ? `<span class="f-badge">${rutaAsignada}</span>` : ''}</span></div>`;
    html += `<div class="f-row"><div class="f-label">Dedicatoria</div><textarea class="f-textarea" id="f-dedi" placeholder="Opcional"></textarea></div>`;
    html += `<div class="f-row"><div class="f-label">Notas para el repartidor</div><textarea class="f-textarea" id="f-notas" placeholder="Opcional"></textarea></div>`;
    html += `<div class="f-row"><div class="f-label">Fecha de entrega</div><input class="f-input" id="f-fecha-entrega" type="date" value="${new Date().toLocaleDateString('en-CA',{timeZone:'America/Chihuahua'})}"></div>`;
    html += '</div>';

    // Horario
    html += '<div class="cart-section"><div class="cart-section-title">Horario de entrega</div>';
    html += '<div class="f-row-inline" style="flex-wrap:wrap;gap:4px">';
    for (const [val, label] of [['manana','Manana (9-2pm)'],['tarde','Tarde (2-6pm)'],['noche','Noche (6-9pm)'],['hora_especifica','Hora especifica']]) {
      html += `<button class="f-chip" data-horario="${val}" onclick="selHorario('${val}',this)">${label}</button>`;
    }
    html += '</div>';
    html += '<div id="hora-especifica-row" style="display:none;margin-top:8px"><input class="f-input" id="f-hora" type="time" style="width:120px"><span style="font-size:11px;color:var(--texto2);margin-left:8px">Min 2h anticipacion</span></div>';
    html += '</div>';

    // Zona y envio
    html += '<div class="cart-section"><div class="cart-section-title">Zona y envio</div>';
    html += `<div id="zona-auto-msg" style="font-size:11px;color:var(--rojo);margin-bottom:6px;display:${zonaAutoMsg?'':'none'}">${zonaAutoMsg||''}</div>`;
    html += '<div class="f-row-inline" style="flex-wrap:wrap;gap:4px">';
    for (const [z, p] of [['Morada','$99'],['Azul','$159'],['Verde','$199']]) {
      html += `<button class="f-chip ${selZonaVal===z?'active':''}" data-zona="${z}" onclick="selZona('${z}',this)">${z} ${p}</button>`;
    }
    html += '</div></div>';
  }

  // Funeral section
  if (modo === 'funeral') {
    html += '<div class="cart-section"><div class="cart-section-title">Datos funeral</div>';
    html += `<div class="f-row"><div class="f-label">Funeraria</div><input class="f-input" id="f-funeraria" placeholder="Buscar funeraria..." oninput="buscarFuneraria()"><div id="f-funeraria-results"></div></div>`;
    html += `<div class="f-row"><div class="f-label">Nombre del fallecido</div><input class="f-input" id="f-fallecido"></div>`;
    html += `<div class="f-row"><div class="f-label">Sala</div><input class="f-input" id="f-sala" placeholder="Opcional"></div>`;
    html += `<div class="f-row"><div class="f-label">Texto banda</div><input class="f-input" id="f-banda" placeholder="Opcional"></div>`;
    html += `<div class="f-row"><div class="f-label">Dedicatoria</div><textarea class="f-textarea" id="f-dedi-fun" placeholder="Opcional"></textarea></div>`;
    html += `<div class="f-row"><div class="f-label">Fecha de entrega</div><input class="f-input" id="f-fecha-funeral" type="date" value="${new Date().toLocaleDateString('en-CA',{timeZone:'America/Chihuahua'})}"></div>`;
    html += `<div class="f-row"><div class="f-label">Horario velacion</div>
      <div class="f-row-inline"><button class="f-chip" onclick="this.classList.toggle('active')">Ya inicio</button>
      <input class="f-input" type="time" id="f-velacion-hora" style="width:120px" placeholder="Hora"></div></div>`;
    html += '</div>';
  }

  // Recoger section
  if (modo === 'recoger') {
    html += '<div class="cart-section"><div class="cart-section-title">Datos recogida</div>';
    html += `<div class="f-row"><div class="f-label">Fecha</div><input class="f-input" id="f-rec-fecha" type="date"></div>`;
    html += `<div class="f-row"><div class="f-label">Hora</div><input class="f-input" id="f-rec-hora" type="time"></div>`;
    html += '</div>';
  }

  // Tax
  html += '<div class="cart-section"><div class="cart-section-title">Impuesto</div>';
  html += '<div class="f-row-inline" style="gap:4px">';
  for (const [val, label] of [['IVA','IVA 16%'],['IEPS','IEPS 8%'],['NA','Sin impuesto']]) {
    html += `<button class="f-chip" data-tax="${val}" onclick="selTax('${val}',this)">${label}</button>`;
  }

  // Payment

  metodos.forEach(m => {
    html += `<button class="f-chip" data-pay="${m}" onclick="togglePay('${m}',this)">${m}</button>`;
  });

  renderTotals();

// ─── Selections ───
let selHorarioVal = null, selZonaVal = null, selTaxVal = 'NA', selectedPays = {};
let funerariaSelId = null;

function selHorario(val, el) {
  selHorarioVal = val;
  document.querySelectorAll('[data-horario]').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  const hr = document.getElementById('hora-especifica-row');
  if (hr) hr.style.display = val === 'hora_especifica' ? '' : 'none';
}

function selZona(val, el) {
  selZonaVal = val;
  document.querySelectorAll('[data-zona]').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderTotals();
}

function selTax(val, el) {
  selTaxVal = val;
  document.querySelectorAll('[data-tax]').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderTotals();
}

function togglePay(name, el) {
  if (selectedPays[name] !== undefined) { delete selectedPays[name]; el.classList.remove('active'); }
  else { selectedPays[name] = 0; el.classList.add('active'); }
  renderPayInputs();
  renderTotals();
}

function renderPayInputs() {
  const div = document.getElementById('pay-inputs');
  if (!div) return;
  let html = '';
  for (const [name, monto] of Object.entries(selectedPays)) {
    html += `<div class="pay-input"><span>${name}:</span><input type="number" value="${monto/100||''}" placeholder="$0" onchange="updatePayMonto('${name}',this.value)">`;
    if (name === 'Link de pago') html += '<span style="color:var(--dorado);font-size:11px">+4%</span>';
    html += '</div>';
  }
  div.innerHTML = html;
}

function updatePayMonto(name, val) {
  selectedPays[name] = Math.round((parseFloat(val) || 0) * 100);
  renderTotals();
}

// ─── Discount helpers ───
function aplicarDescItem() {
  const idx = parseInt(document.getElementById('desc-item-sel')?.value);
  const tipo = document.getElementById('desc-item-tipo')?.value;
  const valor = parseFloat(document.getElementById('desc-item-val')?.value) || 0;
  if (valor <= 0 || isNaN(idx)) return;
  const item = carrito[idx];
  if (!item) return;
  const base = item.precio * item.cantidad;
  const monto = tipo === '%' ? Math.round(base * valor / 100) : Math.round(valor * 100);
  descuentosItem = descuentosItem.filter(d => d.idx !== idx);
  descuentosItem.push({idx, tipo, valor, monto_centavos: Math.min(monto, base)});
  renderCart();
}

function quitarDescItem(idx) {
  descuentosItem = descuentosItem.filter(d => d.idx !== idx);
  renderCart();
}

function aplicarDescTotal() {
  const tipo = document.getElementById('desc-total-tipo')?.value;
  const valor = parseFloat(document.getElementById('desc-total-val')?.value) || 0;
  if (valor <= 0) return;
  descuentosTotal.push({label: tipo === '%' ? `${valor}% descuento` : `Descuento $${valor}`, tipo, valor, monto_centavos: 0, auto: false});
  renderCart();
}

function quitarDescTotal(i) {
  descuentosTotal.splice(i, 1);
  renderCart();
}

// ─── Totals ───
function calcTotals() {
  const subtotalBruto = carrito.reduce((s, i) => s + i.precio * i.cantidad, 0);
  // Item discounts
  const descItemTotal = descuentosItem.reduce((s, d) => s + d.monto_centavos, 0);
  const subtotal = subtotalBruto - descItemTotal;

  let impuesto = 0;
  let iepsIncluido = 0;
  if (selTaxVal === 'IVA') impuesto = Math.round(subtotal * 0.16);
  else if (selTaxVal === 'IEPS') iepsIncluido = Math.round(subtotal * 0.08 / 1.08);
  let envio = 0;
  if (modo === 'domicilio' && selZonaVal) {
    const tarifas = {Morada: 9900, Azul: 15900, Verde: 19900};
    envio = tarifas[selZonaVal] || 0;
  }
  // Total discounts (recalc % ones based on current subtotal)
  let descTotalSum = 0;
  descuentosTotal.forEach(d => {
    d.monto_centavos = d.tipo === '%' ? Math.round(subtotal * d.valor / 100) : Math.round(d.valor * 100);
    descTotalSum += d.monto_centavos;
  });
  let comision = 0;
  if (selectedPays['Link de pago'] > 0) comision = Math.round(selectedPays['Link de pago'] * 0.04);
  const total = subtotal + impuesto + envio - descTotalSum + comision;
  const pagado = Object.values(selectedPays).reduce((s, v) => s + v, 0);
  return {subtotalBruto, subtotal, impuesto, iepsIncluido, envio, descItemTotal, descTotalSum, comision, total, pagado};
}

function renderTotals() {
  const t = calcTotals();
  const div = document.getElementById('cart-totals');
  if (!div) return;
  let html = `<div class="cart-total-row"><span>Subtotal</span><span>$${t.subtotalBruto/100}</span></div>`;
  if (t.descItemTotal) html += `<div class="cart-total-row discount"><span>Desc. productos</span><span>-$${t.descItemTotal/100}</span></div>`;
  if (t.impuesto) html += `<div class="cart-total-row"><span>IVA 16%</span><span>$${t.impuesto/100}</span></div>`;
  if (t.iepsIncluido) html += `<div class="cart-total-row" style="color:var(--texto2)"><span>IEPS incluido (8%)</span><span>$${t.iepsIncluido/100}</span></div>`;
  if (t.envio) html += `<div class="cart-total-row"><span>Envio (${selZonaVal})</span><span>$${t.envio/100}</span></div>`;
  descuentosTotal.forEach(d => {
    if (d.monto_centavos) html += `<div class="cart-total-row discount"><span>${d.label}</span><span>-$${d.monto_centavos/100}</span></div>`;
  });
  if (t.comision) html += `<div class="cart-total-row"><span>Comision link +4%</span><span>$${t.comision/100}</span></div>`;
  html += `<div class="cart-total-row grand"><span>TOTAL</span><span>$${t.total/100}</span></div>`;
  // Pay status
  const falta = t.total - t.pagado;
  if (Object.keys(selectedPays).length > 0) {
    if (falta <= 0) html += '<div class="pay-status ok">✓ Pago completo</div>';
    else html += `<div class="pay-status pending">Falta asignar $${falta/100}</div>`;
  }
  div.innerHTML = html;
}

// ─── Direction ───
function verificarDir() {
  const dir = document.getElementById('f-dir')?.value;
  if (dir) window.open(`https://www.google.com/maps/search/${encodeURIComponent(dir + ', Chihuahua, Mexico')}`, '_blank');
}

let zonaAutoMsg = null;

async function onDirVerificada() {
  const checked = document.getElementById('f-dir-ok')?.checked;
  if (!checked) {
    rutaAsignada = null; zonaAutoMsg = null;
    updateGeoUI();
    return;
  }
  const dir = document.getElementById('f-dir')?.value;
  if (!dir) return;
  zonaAutoMsg = null;
  console.log('[GEO] Geocodificando:', dir);
  try {
    const r = await fetch('/pos/geocodificar', {
      method: 'POST', headers: {'Content-Type': 'application/json'}, credentials: 'include',
      body: JSON.stringify({direccion: dir})
    });
    console.log('[GEO] HTTP status:', r.status);
    const data = await r.json();
    console.log('[GEO] Respuesta:', data);
    if (data.error) { console.warn('[GEO] Error:', data.error); }
    if (data.ruta) { rutaAsignada = data.ruta; geoLat = data.lat; geoLng = data.lng; }
    if (data.zona_envio) {
      selZonaVal = data.zona_envio;
      zonaAutoMsg = null;
    } else if (!data.error) {
      zonaAutoMsg = 'Direccion fuera de cobertura — seleccionar zona manualmente';
    }
  } catch(e) { console.error('[GEO] Fetch error:', e); }
  updateGeoUI();
}

function updateGeoUI() {
  // Update ruta badge in-place
  const badgeEl = document.getElementById('geo-ruta-badge');
  if (badgeEl) badgeEl.innerHTML = rutaAsignada ? `<span class="f-badge">${rutaAsignada}</span>` : '';
  // Update zona chips in-place
  document.querySelectorAll('[data-zona]').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.zona === selZonaVal);
  });
  // Update zona message
  const msgEl = document.getElementById('zona-auto-msg');
  if (msgEl) {
    msgEl.textContent = zonaAutoMsg || '';
    msgEl.style.display = zonaAutoMsg ? '' : 'none';
  }
  renderTotals();
}

// ─── Funeraria search ───
async function buscarFuneraria() {
  const q = document.getElementById('f-funeraria')?.value;
  if (!q || q.length < 2) { document.getElementById('f-funeraria-results').innerHTML = ''; return; }
  try {
    const r = await fetch(`/funerarias/buscar?nombre=${encodeURIComponent(q)}`, {credentials:'include'});
    if (!r.ok) { document.getElementById('f-funeraria-results').innerHTML = '<div style="padding:8px;font-size:12px;color:var(--texto2)">No encontrada</div>'; return; }
    const f = await r.json();
    document.getElementById('f-funeraria-results').innerHTML =
      `<div class="modal-item" onclick="selFuneraria(${f.id},'${f.nombre.replace(/'/g,"\\'")}','${f.zona}',${f.costo_envio})">${f.nombre} — ${f.zona} $${f.costo_envio/100}</div>`;
  } catch(e) {}
}

function selFuneraria(id, nombre, zona, costo) {
  funerariaSelId = id;
  document.getElementById('f-funeraria').value = nombre;
  document.getElementById('f-funeraria-results').innerHTML = '';
  selZonaVal = zona;
  renderTotals();
}

// ─── Client ───
function abrirBuscarCliente() {
  document.getElementById('cliente-q').value = '';
  document.getElementById('cliente-results').innerHTML = '';
  document.getElementById('modal-cliente').classList.add('active');
}

async function buscarClientes() {
  const q = document.getElementById('cliente-q').value;
  if (q.length < 2) { document.getElementById('cliente-results').innerHTML = ''; return; }
  try {
    const r = await fetch(`/pos/clientes/buscar?q=${encodeURIComponent(q)}`, {credentials:'include'});
    if (!r.ok) return;
    const cls = await r.json();
    document.getElementById('cliente-results').innerHTML = cls.map(c =>
      `<div class="modal-item" onclick="seleccionarCliente(${c.id},'${c.nombre.replace(/'/g,"\\'")}','${c.telefono}',${c.primera_compra})">${c.nombre} — ${c.telefono}${c.primera_compra ? ' <span class="badge-desc">10%</span>' : ''}</div>`
    ).join('') || '<div style="padding:10px;color:var(--texto2);font-size:13px">Sin resultados</div>';
  } catch(e) {}
}

function seleccionarCliente(id, nombre, telefono, primera) {
  clienteSel = {id, nombre, telefono, primera_compra: primera};
  document.getElementById('modal-cliente').classList.remove('active');
  updateClienteBtn();
  renderCart();
}

function aplicarPrimeraCompra() {
  if (descuentosTotal.some(d => d.auto)) return;
  descuentosTotal.push({label:'10% primera compra', tipo:'%', valor:10, monto_centavos:0, auto:true});

// ─── Validation ───
function clearErrors() {
  document.querySelectorAll('.f-error').forEach(el => el.classList.remove('f-error'));
  document.querySelectorAll('.f-err').forEach(el => el.remove());
}

function addError(fieldId, msg) {
  const el = document.getElementById(fieldId);
  if (!el) return false;
  el.classList.add('f-error');
  const err = document.createElement('div');
  err.className = 'f-err';
  err.textContent = msg;
  el.parentElement.appendChild(err);
  return true;
}

function validarFinalizacion() {
  clearErrors();
  const t = calcTotals();
  const errors = [];

  // All modes: products
  if (!carrito.length) { errors.push({id: null, msg: 'Agrega productos al carrito'}); }

  if (modo === 'mostrador') {
    if (Object.keys(selectedPays).length === 0) errors.push({id: null, msg: 'Selecciona un metodo de pago'});
    else if (t.pagado < t.total) errors.push({id: null, msg: `Falta asignar $${(t.total - t.pagado)/100}`});
  }

  if (modo === 'domicilio') {
    if (!clienteSel) errors.push({id: null, msg: 'Selecciona un cliente'});
    if (!document.getElementById('f-dest-nombre')?.value.trim()) errors.push({id: 'f-dest-nombre', msg: 'Nombre obligatorio'});
    if (!document.getElementById('f-dest-tel')?.value.trim()) errors.push({id: 'f-dest-tel', msg: 'Telefono obligatorio'});
    if (!document.getElementById('f-dir')?.value.trim()) errors.push({id: 'f-dir', msg: 'Direccion obligatoria'});
    if (!document.getElementById('f-fecha-entrega')?.value) errors.push({id: 'f-fecha-entrega', msg: 'Fecha obligatoria'});
    if (!selHorarioVal) errors.push({id: null, msg: 'Selecciona un horario de entrega'});
    if (selHorarioVal === 'hora_especifica' && !document.getElementById('f-hora')?.value) errors.push({id: 'f-hora', msg: 'Hora obligatoria'});
    if (!selZonaVal) errors.push({id: null, msg: 'Selecciona zona de envio'});
    if (Object.keys(selectedPays).length === 0) errors.push({id: null, msg: 'Selecciona un metodo de pago'});
    else if (t.pagado < t.total) errors.push({id: null, msg: `Falta asignar $${(t.total - t.pagado)/100}`});
  }

  if (modo === 'funeral') {
    if (!clienteSel) errors.push({id: null, msg: 'Selecciona un cliente'});
    const nonFuneral = carrito.filter(i => i.categoria.toLowerCase() !== 'funeral');
    if (nonFuneral.length) errors.push({id: null, msg: 'Solo productos de funeral permitidos'});
    if (!funerariaSelId) errors.push({id: 'f-funeraria', msg: 'Funeraria obligatoria'});
    if (!document.getElementById('f-fallecido')?.value.trim()) errors.push({id: 'f-fallecido', msg: 'Nombre del fallecido obligatorio'});
    if (!document.getElementById('f-fecha-funeral')?.value) errors.push({id: 'f-fecha-funeral', msg: 'Fecha obligatoria'});
    if (!document.getElementById('f-velacion-hora')?.value) errors.push({id: 'f-velacion-hora', msg: 'Horario velacion obligatorio'});
    if (Object.keys(selectedPays).length === 0) errors.push({id: null, msg: 'Selecciona un metodo de pago'});
    else if (t.pagado < t.total) errors.push({id: null, msg: `Falta asignar $${(t.total - t.pagado)/100}`});
  }

  if (modo === 'recoger') {
    if (!clienteSel) errors.push({id: null, msg: 'Selecciona un cliente'});
    if (!document.getElementById('f-rec-fecha')?.value) errors.push({id: 'f-rec-fecha', msg: 'Fecha obligatoria'});
    if (!document.getElementById('f-rec-hora')?.value) errors.push({id: 'f-rec-hora', msg: 'Hora obligatoria'});
  }

  if (errors.length) {
    let firstEl = null;
    for (const e of errors) {
      if (e.id) {
        addError(e.id, e.msg);
        if (!firstEl) firstEl = document.getElementById(e.id);
      }
    }
    // Show non-field errors in alert
    const general = errors.filter(e => !e.id).map(e => e.msg);
    if (general.length) alert(general.join('\n'));
    if (firstEl) firstEl.scrollIntoView({behavior:'smooth', block:'center'});
    return false;
  }
  return true;
}

// ─── Submit order ───
async function submitPedido(estado) {
  if (!carrito.length) { alert('Agrega productos al carrito'); return; }

  if (estado === 'pagado' && !validarFinalizacion()) return;

  const t = calcTotals();

  const body = {
    tipo: modo,
    cliente_id: clienteSel?.id || null,
    items: carrito.map((i, idx) => {
      const di = descuentosItem.find(d => d.idx === idx);
      return {producto_id: i.producto_id, cantidad: i.cantidad, precio_unitario: i.precio, descuento_item: di ? di.monto_centavos : 0};
    }),
    tipo_impuesto: selTaxVal,
    pagos: Object.entries(selectedPays).map(([name, monto]) => ({metodo_pago_id: 0, monto, nombre: name})),
    estado,
    descuentos: descuentosTotal.map(d => ({label: d.label, monto: d.monto_centavos})),
    descuento_total: t.descTotalSum + t.descItemTotal,
  };

  if (modo === 'domicilio') {
    body.nombre_destinatario = document.getElementById('f-dest-nombre')?.value || '';
    body.telefono_destinatario = document.getElementById('f-dest-tel')?.value || '';
    body.direccion_entrega = document.getElementById('f-dir')?.value || '';
    body.dedicatoria = document.getElementById('f-dedi')?.value || '';
    body.notas_entrega = document.getElementById('f-notas')?.value || '';
    body.fecha_entrega = document.getElementById('f-fecha-entrega')?.value || null;
    body.horario_entrega = selHorarioVal;
    body.hora_especifica = document.getElementById('f-hora')?.value || null;
    body.zona_envio = selZonaVal;
    body.ruta = rutaAsignada;
    body.lat = geoLat;
    body.lng = geoLng;
  }

  if (modo === 'funeral') {
    body.funeraria_id = funerariaSelId;
    body.nombre_fallecido = document.getElementById('f-fallecido')?.value || '';
    body.sala = document.getElementById('f-sala')?.value || '';
    body.banda = document.getElementById('f-banda')?.value || '';
    body.dedicatoria = document.getElementById('f-dedi-fun')?.value || '';
    body.fecha_entrega = document.getElementById('f-fecha-funeral')?.value || null;
    body.horario_velacion = document.getElementById('f-velacion-hora')?.value || 'ya_inicio';
  }

  if (modo === 'recoger') {
    body.fecha_recoger = document.getElementById('f-rec-fecha')?.value || null;
  }

  try {
    const r = await fetch('/pos/pedido', {
      method: 'POST', headers: {'Content-Type': 'application/json'}, credentials: 'include',
      body: JSON.stringify(body)
    });
    if (!r.ok) { const d = await r.json(); alert(d.detail || 'Error al crear pedido'); return; }
    const result = await r.json();
    mostrarModalCreado(result);
  } catch(e) { alert('Error de conexion'); }
}

function guardarPedido() { submitPedido('pendiente_pago'); }
function finalizarVenta() { submitPedido('pagado'); }

function buildTicketLines() {
  const r = lastResult;
  const items = lastCarritoSnapshot;
  let L = [];
  L.push('<div class="dsep"></div>');
  L.push('<div class="tline"><strong>FLORERIA LUCY</strong></div>');
  L.push('<div class="dsep"></div>');
  L.push(`<div>Pedido: <strong>${r.folio}</strong></div>`);
  L.push(`<div>Fecha: ${new Date().toLocaleDateString('es-MX')}</div>`);
  L.push('<div class="sep"></div>');
  L.push('<div>PRODUCTOS:</div>');
  for (const item of items) {
    L.push(`<div>${item.cantidad}x ${item.nombre} $${(item.precio*item.cantidad)/100}</div>`);
  }
  L.push('<div class="sep"></div>');
  if (r.envio > 0) L.push(`<div>Envio: $${r.envio/100}</div>`);
  if (r.impuesto > 0) L.push(`<div>Impuesto: $${r.impuesto/100}</div>`);
  if (r.descuento > 0) L.push(`<div>Descuento: -$${r.descuento/100}</div>`);
  L.push(`<div>TOTAL: <strong>$${r.total/100}</strong></div>`);
  L.push('<div class="dsep"></div>');
  L.push('<div class="tline">Gracias por su preferencia</div>');
  L.push('<div class="dsep"></div>');
  return L;
}

async function compartirWhatsApp() {
  const btn = document.getElementById('btn-wa');
  const note = document.getElementById('wa-note');
  if (!clienteSel || !clienteSel.telefono) return;
  btn.disabled = true;
  btn.textContent = '⏳ Enviando...';
  note.style.display = 'none';

  // Render ticket HTML into a temporary container for html2canvas
  const container = document.createElement('div');
  container.style.cssText = 'position:fixed;left:-9999px;top:0;width:300px;padding:16px;background:#fff;font-family:Courier New,monospace;font-size:12px;line-height:1.5;color:#000';
  container.innerHTML = buildTicketLines().join('\n');
  document.body.appendChild(container);

  try {
    const canvas = await html2canvas(container, {scale: 2, backgroundColor: '#ffffff'});
    document.body.removeChild(container);
    const dataUrl = canvas.toDataURL('image/png');
    const base64 = dataUrl.split(',')[1];

    const resp = await fetch('/pos/enviar-ticket-whatsapp', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        pedido_id: lastResult.id,
        telefono: clienteSel.telefono,
        nombre_cliente: clienteSel.nombre,
        imagen_base64: base64,
      }),
    });
    const data = await resp.json();
    if (data.ok) {
      btn.textContent = '✓ Enviado';
      btn.style.background = '#2d5a3d';
      btn.disabled = true;
    } else {
      note.textContent = data.error || 'Error al enviar';
      note.style.color = 'var(--rojo)';
      note.style.display = '';
      btn.disabled = false;
      btn.textContent = '💬 Enviar por WhatsApp';
    }
  } catch(e) {
    if (container.parentNode) document.body.removeChild(container);
    note.textContent = 'Error al generar o enviar imagen';
    note.style.color = 'var(--rojo)';
    note.style.display = '';
    btn.disabled = false;
    btn.textContent = '💬 Enviar por WhatsApp';
  }
}

function renderDrawer() {
  if (!dwData) return;
  const body = document.getElementById('drawer-body');

    if (!dwData.pendientes.length) { body.innerHTML = '<div style="text-align:center;padding:30px;color:var(--texto2)">Sin pedidos pendientes</div>'; return; }
    body.innerHTML = dwData.pendientes.map(p => `<div class="dw-card">

        <button class="dw-btn-fin" onclick="abrirFinPend(${p.id},'${p.folio}',${p.total||0})">Finalizar</button>
      </div>
    </div>`).join('');
  } else {
    let html = '';
    if (!dwData.finalizados.length) {
      html = '<div style="text-align:center;padding:30px;color:var(--texto2)">Sin pedidos finalizados</div>';
    } else {
      html = dwData.finalizados.map(p => `<div class="dw-card">
        <div class="dw-card-hdr"><span class="dw-card-folio">${p.folio}</span><span class="dw-card-total">$${(p.total||0)/100}</span></div>
        <div style="font-size:12px">${p.cliente_nombre || 'Mostrador'}</div>
        <div class="dw-card-items">${p.items.map(i => `${i.cantidad}x ${i.nombre}`).join(', ')}</div>
        <div class="dw-card-pago">${p.forma_pago||''}</div>
        <div class="dw-card-actions">
          <button class="dw-btn-edit" onclick='abrirEditar(${JSON.stringify(p).replace(/'/g,"&#39;")})'>Editar</button>
          <button class="dw-btn-print" onclick="reimprimirTicket(${p.id},'${p.folio}',${p.total||0})">🖨 Ticket</button>
        </div>
      </div>`).join('');
    }
    // Resumen
    const res = dwData.resumen;
    html += '<div class="dw-resumen"><h4>Resumen del dia</h4>';
    html += `<div class="dw-resumen-row"><span>Pedidos finalizados</span><span>${res.num_finalizados}</span></div>`;

      if (monto > 0) html += `<div class="dw-resumen-row"><span>${metodo}</span><span>$${monto/100}</span></div>`;
    }
    html += `<div class="dw-resumen-row dw-resumen-total"><span>TOTAL DEL DIA</span><span>$${res.total_vendido/100}</span></div>`;
    html += '</div>';
    body.innerHTML = html;
  }
}

function abrirFinPend(id, folio, total) {
  finPendId = id;
  finPendPays = {};
  document.getElementById('fin-pend-folio').textContent = folio;
  document.getElementById('fin-pend-total').textContent = `Total: $${total/100}`;
  document.getElementById('fin-pend-err').style.display = 'none';
  const metodos = ['Efectivo','Tarjeta credito','Tarjeta debito','Transferencia','Link de pago','OXXO'];
  document.getElementById('fin-pend-pays').innerHTML = metodos.map(m =>
    `<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">
      <label style="font-size:12px;display:flex;align-items:center;gap:4px;min-width:120px"><input type="checkbox" onchange="toggleFinPay('${m}',this.checked)"> ${m}</label>
      <input class="f-input" type="number" placeholder="$0" style="width:80px;font-size:12px;padding:6px" id="fin-pay-${m.replace(/ /g,'_')}" disabled onchange="updateFinPay('${m}',this.value)">
    </div>`
  ).join('');
  document.getElementById('modal-fin-pend').classList.add('active');
}

function toggleFinPay(name, checked) {
  const input = document.getElementById('fin-pay-' + name.replace(/ /g,'_'));
  if (checked) { finPendPays[name] = 0; input.disabled = false; }
  else { delete finPendPays[name]; input.disabled = true; input.value = ''; }
}

function updateFinPay(name, val) {
  finPendPays[name] = Math.round((parseFloat(val)||0) * 100);
}

async function confirmarFinPend() {
  const pagos = Object.entries(finPendPays).filter(([,v]) => v > 0).map(([nombre, monto]) => ({nombre, monto}));
  if (!pagos.length) { document.getElementById('fin-pend-err').textContent = 'Selecciona metodo de pago'; document.getElementById('fin-pend-err').style.display = ''; return; }
  try {
    const r = await fetch(`/pos/pedido/${finPendId}/finalizar`, {
      method:'PATCH', headers:{'Content-Type':'application/json'}, credentials:'include',
      body: JSON.stringify({pagos})
    });
    if (!r.ok) { const d = await r.json(); document.getElementById('fin-pend-err').textContent = d.detail||'Error'; document.getElementById('fin-pend-err').style.display = ''; return; }
    document.getElementById('modal-fin-pend').classList.remove('active');

}

  setTimeout(() => window.print(), 200);
}
