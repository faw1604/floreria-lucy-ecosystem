<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Floreria Lucy — Taller</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--verde:#193a2c;--verde-m:#2d5a3d;--crema:#faf8f5;--blanco:#fff;--texto:#1a1a1a;--texto2:#5a5a5a;--borde:#e5e0d8;--rojo:#dc3545;--naranja:#f59e0b;--verde-c:#16a34a;--azul:#3b82f6;--gris:#9ca3af;--morado:#7c3aed;--acento:#c9956a}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--crema);color:var(--texto);font-family:'Inter',sans-serif;min-height:100vh}

/* Header */
.header{position:fixed;top:0;left:0;right:0;z-index:50;background:var(--verde);color:var(--blanco);padding:12px 20px;display:flex;align-items:center;justify-content:space-between}
.header-logo{font-family:'Playfair Display',serif;font-size:18px;font-weight:600}
.header-logo span{opacity:.7;font-family:'Inter',sans-serif;font-size:13px;font-weight:400;margin-left:8px}
.header-right{display:flex;align-items:center;gap:16px;font-size:13px}
.header-time{opacity:.8}
.header-btn{font-size:12px;background:rgba(255,255,255,.15);border:none;color:#fff;padding:6px 14px;border-radius:6px;cursor:pointer;text-decoration:none}
.header-btn:hover{background:rgba(255,255,255,.25)}
.notif-badge{background:var(--rojo);color:#fff;font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* Tabs */
.tabs{position:fixed;top:48px;left:0;right:0;z-index:40;background:var(--blanco);border-bottom:1px solid var(--borde);display:flex;overflow-x:auto;padding:0 12px}
.tab{padding:10px 18px;font-size:13px;font-weight:500;color:var(--texto2);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;font-family:inherit}
.tab:hover{color:var(--texto)}
.tab.active{color:var(--verde);border-bottom-color:var(--verde);font-weight:600}
.tab.hidden{display:none}

/* Main */
.main{padding:96px 16px 24px;max-width:1200px;margin:0 auto}
.tab-content{display:none}
.tab-content.active{display:block}

/* Section */
.section{margin-bottom:28px}
.section-title{font-size:15px;font-weight:600;color:var(--texto2);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.section-count{font-size:12px;background:var(--borde);color:var(--texto2);padding:2px 8px;border-radius:10px}
.day-label{font-size:17px;font-weight:700;color:var(--verde);margin:20px 0 12px;padding-bottom:6px;border-bottom:2px solid var(--verde)}

/* Grid */
.pedidos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:12px}

/* Card */
.pedido-card{background:var(--blanco);border-radius:14px;padding:16px;box-shadow:0 1px 8px rgba(0,0,0,.06);border-left:5px solid var(--borde);position:relative}
.pedido-card.pago-pendiente{border-color:var(--rojo);background:#fff5f5}
.pedido-card .pago-warn{background:var(--rojo);color:#fff;font-size:11px;font-weight:600;padding:4px 10px;border-radius:6px;margin-bottom:10px;display:inline-block}
.pedido-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.pedido-num{font-size:20px;font-weight:700;color:var(--verde);letter-spacing:-.02em}
.pedido-producto{font-size:16px;font-weight:700;color:var(--texto);margin-bottom:6px}
.pedido-producto-code{font-size:11px;color:var(--texto2);font-weight:400;margin-left:6px}
.badge-personalizado{background:var(--naranja);color:#fff;font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;display:inline-block;margin-bottom:4px}
.pedido-producto-obs{font-style:italic;font-size:12px;color:var(--texto2);margin-bottom:4px}
.pedido-estado{font-size:11px;font-weight:600;padding:4px 10px;border-radius:8px;text-transform:uppercase}
.estado-nuevo{background:#fee2e2;color:#991b1b}
.estado-produccion{background:#fef3c7;color:#92400e}
.estado-listo{background:#dcfce7;color:#166534}
.estado-camino{background:#dbeafe;color:#1e40af}
.estado-entregado{background:#f3f4f6;color:#6b7280}
.estado-cancelado{background:#f3f4f6;color:#9ca3af;text-decoration:line-through}
.estado-pendiente-pago{background:#fef3c7;color:#92400e}

.pedido-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;text-transform:uppercase;margin-bottom:6px;display:inline-block;margin-right:4px}
.badge-funeral{background:#1a1a1a;color:#fff}
.badge-evento{background:var(--morado);color:#fff}
.badge-florista{font-size:10px;font-weight:600;padding:3px 8px;border-radius:6px;display:inline-block;margin-bottom:6px}
.badge-esperando{background:#fef3c7;color:#92400e}
.badge-cambio{background:#fed7aa;color:#9a3412}
.badge-rechazado{background:#fee2e2;color:#991b1b}

.pedido-receptor{font-size:14px;font-weight:600;margin-bottom:4px}
.pedido-detail{font-size:12px;color:var(--texto2);margin-bottom:3px;display:flex;align-items:flex-start;gap:6px}
.pedido-dedicatoria{font-style:italic;color:var(--verde-m);background:#f0f7f2;padding:8px 10px;border-radius:8px;font-size:12px;margin:8px 0;line-height:1.4}
.pedido-notas{background:#fef9e7;border-left:3px solid var(--naranja);padding:8px 10px;font-size:12px;margin:8px 0;line-height:1.4;color:#92400e}
.pedido-pago{font-size:12px;margin:8px 0;font-weight:500}
.funeral-timer{font-size:11px;font-weight:600;padding:4px 8px;border-radius:6px;display:inline-block;margin-bottom:6px}
.timer-green{background:#dcfce7;color:#166534}
.timer-yellow{background:#fef3c7;color:#92400e}
.timer-red{background:#fee2e2;color:#991b1b;animation:pulse 1s infinite}

/* Action buttons */
.pedido-actions{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap}
.action-btn{padding:9px 14px;border:none;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s}
.action-btn:active{transform:scale(.96)}
.btn-aceptar{background:var(--verde-c);color:#fff}
.btn-aceptar:hover{background:#15803d}
.btn-modificar{background:var(--naranja);color:#fff}
.btn-modificar:hover{background:#d97706}
.btn-cambio{background:var(--azul);color:#fff}
.btn-cambio:hover{background:#2563eb}
.btn-rechazar{background:var(--rojo);color:#fff}
.btn-rechazar:hover{background:#b91c1c}
.btn-listo{background:var(--verde-c);color:#fff}
.btn-listo:hover{background:#15803d}
.btn-imprimir{background:var(--blanco);color:var(--texto);border:1px solid var(--borde)}
.btn-imprimir:hover{border-color:var(--verde);color:var(--verde)}
.btn-foto{background:var(--blanco);color:var(--texto2);border:1px solid var(--borde);font-size:11px;padding:8px 10px}
.btn-foto:hover{border-color:var(--verde);color:var(--verde)}

.empty{text-align:center;padding:30px;color:var(--texto2);font-size:13px;opacity:.6}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;align-items:center;justify-content:center}
.modal-overlay.active{display:flex}
.modal-box{background:var(--blanco);border-radius:16px;padding:24px;max-width:500px;width:90%;max-height:85vh;overflow-y:auto;position:relative}
.modal-close{position:absolute;top:10px;right:14px;font-size:22px;background:none;border:none;cursor:pointer;color:var(--texto2);line-height:1}
.modal-close:hover{color:var(--texto)}
.modal-title{font-size:16px;font-weight:600;margin-bottom:16px;color:var(--verde)}
.modal-input{width:100%;padding:10px 12px;border:1px solid var(--borde);border-radius:8px;font-size:13px;font-family:inherit;margin-bottom:12px}
.modal-input:focus{outline:none;border-color:var(--verde)}
.modal-select{width:100%;padding:10px 12px;border:1px solid var(--borde);border-radius:8px;font-size:13px;font-family:inherit;margin-bottom:12px;background:var(--blanco)}
.modal-submit{padding:10px 20px;background:var(--verde);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.modal-submit:hover{background:var(--verde-m)}

/* Product search results */
.search-results{max-height:200px;overflow-y:auto;border:1px solid var(--borde);border-radius:8px;margin-bottom:12px}
.search-item{padding:10px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--borde);display:flex;justify-content:space-between}
.search-item:last-child{border-bottom:none}
.search-item:hover{background:var(--crema)}
.search-item.selected{background:#dcfce7}

/* Foto modal */
.producto-item{margin-bottom:16px;text-align:center;border-bottom:1px solid var(--borde);padding-bottom:16px}
.producto-item:last-child{border-bottom:none;padding-bottom:0;margin-bottom:0}
.producto-img{max-width:100%;max-height:280px;border-radius:10px;object-fit:contain;background:#f5f5f5}
.producto-nombre{font-size:14px;font-weight:600;margin-top:8px}
.producto-codigo{font-size:12px;color:var(--texto2)}
.producto-sin-foto{padding:30px;color:var(--texto2);font-size:13px}

/* Inventario */
.inv-section{margin-bottom:20px}
.inv-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--verde);color:#fff;border-radius:10px;cursor:pointer;font-size:14px;font-weight:600}
.inv-header:hover{background:var(--verde-m)}
.inv-body{padding:8px 0}
.inv-body.collapsed{display:none}
.inv-colors.collapsed{display:none}
.inv-family{border-bottom:1px solid var(--borde)}
.inv-row{display:flex;align-items:center;gap:10px;padding:8px 14px;border-bottom:1px solid var(--borde);font-size:13px}
.inv-row:last-child{border-bottom:none}
.inv-name{flex:1;font-weight:500}
.inv-name .auto-badge{font-size:9px;color:var(--naranja);margin-left:4px}
.inv-qty{display:flex;align-items:center;gap:6px}
.inv-qty button{width:28px;height:28px;border:1px solid var(--borde);border-radius:6px;background:var(--blanco);cursor:pointer;font-size:14px;font-weight:600;display:flex;align-items:center;justify-content:center}
.inv-qty button:hover{border-color:var(--verde);color:var(--verde)}
.inv-qty span{width:36px;text-align:center;font-weight:600;font-size:14px}
.inv-status select{padding:4px 8px;border:1px solid var(--borde);border-radius:6px;font-size:11px;font-family:inherit}
.inv-subtabs{display:flex;gap:8px;margin-bottom:16px}
.inv-subtab{padding:8px 16px;border:1px solid var(--borde);border-radius:8px;background:var(--blanco);cursor:pointer;font-size:13px;font-weight:500;font-family:inherit}
.inv-subtab.active{background:var(--verde);color:#fff;border-color:var(--verde)}
.inv-note{font-size:12px;color:var(--texto2);margin-top:16px;padding:10px;background:var(--blanco);border-radius:8px;border-left:3px solid var(--naranja)}

/* Agendados table */
.agenda-table{width:100%;border-collapse:collapse;font-size:13px}
.agenda-table th{text-align:left;padding:10px 12px;background:var(--verde);color:#fff;font-weight:600;font-size:12px}
.agenda-table td{padding:10px 12px;border-bottom:1px solid var(--borde)}
.agenda-table tr:hover td{background:var(--crema)}

/* Print */
#print-frame{display:none}
@media print{
  body *{display:none!important}
  #print-frame,#print-frame *{display:block!important}
  @page{size:80mm auto;margin:3mm}
  #print-frame{font-family:'Courier New',monospace;font-size:10pt;width:74mm;color:#000;line-height:1.4}
  #print-frame .tline{text-align:center}
  #print-frame .sep{border-top:1px dashed #000;margin:4px 0}
  #print-frame .dsep{border-top:2px solid #000;margin:4px 0}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">Floreria Lucy<span>Taller</span></div>
  <div class="header-right">
    <span class="header-time" id="hdr-date"></span>
    <span class="header-time" id="hdr-time"></span>
    <span class="notif-badge" id="notif-badge" style="display:none" title="Pedidos pendientes de aprobacion">0</span>
    <a class="header-btn" href="/panel/">Volver al panel</a>
  </div>
</div>

<div class="tabs">
  <button class="tab active" data-tab="pedidos">Pedidos</button>
  <button class="tab" data-tab="agendados">Pedidos Agendados</button>
  <button class="tab hidden" data-tab="fecha-fuerte" id="tab-fecha-fuerte">Produccion Fecha Fuerte</button>
  <button class="tab" data-tab="realizados">Pedidos Realizados</button>
  <button class="tab" data-tab="inventario">Inventario</button>
</div>

<div class="main">
  <!-- TAB: Pedidos -->
  <div class="tab-content active" id="content-pedidos">
    <div id="pedidos-hoy"></div>
    <div id="pedidos-manana"></div>
  </div>

  <!-- TAB: Agendados -->
  <div class="tab-content" id="content-agendados">
    <div id="agendados-body"></div>
  </div>

  <!-- TAB: Fecha Fuerte -->
  <div class="tab-content" id="content-fecha-fuerte">
    <div id="fecha-fuerte-body"><div class="empty">Cargando...</div></div>
  </div>

  <!-- TAB: Realizados -->
  <div class="tab-content" id="content-realizados">
    <div id="realizados-body"></div>
  </div>

  <!-- TAB: Inventario -->
  <div class="tab-content" id="content-inventario">
    <div class="inv-subtabs">
      <button class="inv-subtab active" data-inv="floral">Insumos Florales</button>
      <button class="inv-subtab" data-inv="no-floral">Insumos No Florales</button>
    </div>
    <div id="inv-floral"></div>
    <div id="inv-no-floral" style="display:none"></div>
    <div class="inv-note">Los insumos marcados con <strong>⚡</strong> se descuentan automaticamente al elaborar pedidos</div>
  </div>
</div>

<!-- Modal: Modificacion -->
<div class="modal-overlay" id="modal-modificacion" onclick="if(event.target===this)cerrarModal('modal-modificacion')">
  <div class="modal-box">
    <button class="modal-close" onclick="cerrarModal('modal-modificacion')">&times;</button>
    <div class="modal-title">Aceptar con modificacion</div>
    <textarea class="modal-input" id="mod-texto" rows="3" placeholder="¿Cual es la modificacion?"></textarea>
    <button class="modal-submit" id="mod-submit">Confirmar modificacion</button>
  </div>
</div>

<!-- Modal: Sugerir cambio -->
<div class="modal-overlay" id="modal-cambio" onclick="if(event.target===this)cerrarModal('modal-cambio')">
  <div class="modal-box">
    <button class="modal-close" onclick="cerrarModal('modal-cambio')">&times;</button>
    <div class="modal-title">Sugerir cambio de arreglo</div>
    <input class="modal-input" id="cambio-buscar" placeholder="Buscar producto..." oninput="buscarProductos()">
    <div class="search-results" id="cambio-results"></div>
    <button class="modal-submit" id="cambio-submit" disabled>Confirmar sugerencia</button>
  </div>
</div>

<!-- Modal: Rechazar -->
<div class="modal-overlay" id="modal-rechazo" onclick="if(event.target===this)cerrarModal('modal-rechazo')">
  <div class="modal-box">
    <button class="modal-close" onclick="cerrarModal('modal-rechazo')">&times;</button>
    <div class="modal-title">Razon del rechazo</div>
    <select class="modal-select" id="rechazo-razon" onchange="toggleRechazoOtro()">
      <option value="">Seleccionar razon...</option>
      <option value="No tenemos ese producto en stock">No tenemos ese producto en stock</option>
      <option value="No podemos entregar en ese horario">No podemos entregar en ese horario</option>
      <option value="Pedido incompleto — faltan datos">Pedido incompleto — faltan datos</option>
      <option value="Condiciones de pago no cumplidas">Condiciones de pago no cumplidas</option>
      <option value="otros">Otros</option>
    </select>
    <textarea class="modal-input" id="rechazo-otro" rows="2" placeholder="Especificar razon..." style="display:none"></textarea>
    <button class="modal-submit" id="rechazo-submit">Confirmar rechazo</button>
  </div>
</div>

<!-- Modal: Fotos -->
<div class="modal-overlay" id="foto-modal" onclick="if(event.target===this)cerrarModal('foto-modal')">
  <div class="modal-box">
    <button class="modal-close" onclick="cerrarModal('foto-modal')">&times;</button>
    <div class="modal-title" id="foto-modal-title">Productos del pedido</div>
    <div id="foto-modal-body"></div>
  </div>
</div>

<div id="print-frame"></div>

<script>
const API = '';
let prevCountHoy = -1;
let currentModalPedidoId = null;
let selectedProducto = null;
let allProductos = [];
let temporadaActiva = false;

// ─── Clock ───
function updateClock() {
  const now = new Date();
  const opts = {timeZone:'America/Chihuahua'};
  document.getElementById('hdr-date').textContent = now.toLocaleDateString('es-MX',{...opts,weekday:'long',day:'numeric',month:'long'});
  document.getElementById('hdr-time').textContent = now.toLocaleTimeString('es-MX',{...opts,hour:'2-digit',minute:'2-digit'});
}

// ─── Tabs ───
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById('content-' + t.dataset.tab).classList.add('active');
    if (t.dataset.tab === 'agendados') loadAgendados();
    if (t.dataset.tab === 'realizados') loadRealizados();
    if (t.dataset.tab === 'inventario') loadInventario();
  });
});

// ─── Inv subtabs ───
document.querySelectorAll('.inv-subtab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.inv-subtab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById('inv-floral').style.display = t.dataset.inv === 'floral' ? '' : 'none';
    document.getElementById('inv-no-floral').style.display = t.dataset.inv === 'no-floral' ? '' : 'none';
  });
});

// ─── Estado helpers ───
function estadoClass(estado) {
  const e = (estado||'').toLowerCase();
  if (e.includes('nuevo')) return 'estado-nuevo';
  if (e.includes('producci')) return 'estado-produccion';
  if (e === 'listo') return 'estado-listo';
  if (e.includes('camino')) return 'estado-camino';
  if (e.includes('entregado')) return 'estado-entregado';
  if (e.includes('cancelado')) return 'estado-cancelado';
  if (e.includes('pendiente')) return 'estado-pendiente-pago';
  return '';
}

function classify(p) {
  const h = (p.horario_entrega||'').toLowerCase();
  if (!p.direccion_entrega && !p.zona_entrega) return 'tienda';
  if (h.includes('mañana') || h.includes('manana')) return 'manana';
  if (h.includes('tarde')) return 'tarde';
  if (h.includes('noche')) return 'noche';
  return 'manana';
}

// ─── Funeral timer ───
function funeralTimer(p) {
  if (p.tipo_especial !== 'Funeral' || !p.hora_exacta) return '';
  try {
    const now = new Date();
    const chiNow = new Date(now.toLocaleString('en-US', {timeZone:'America/Chihuahua'}));
    const [hStr, period] = p.hora_exacta.toLowerCase().split(/(am|pm)/);
    let [h, m] = (hStr||'').split(':').map(Number);
    if (isNaN(h)) return '';
    if (isNaN(m)) m = 0;
    if (period === 'pm' && h < 12) h += 12;
    if (period === 'am' && h === 12) h = 0;
    const target = new Date(chiNow);
    target.setHours(h, m, 0, 0);
    const diffMin = Math.round((target - chiNow) / 60000);
    if (diffMin < 0) return '<span class="funeral-timer timer-red">HORA PASADA</span>';
    const hrs = Math.floor(diffMin / 60);
    const mins = diffMin % 60;
    let cls = 'timer-green';
    if (diffMin < 60) cls = 'timer-red';
    else if (diffMin < 120) cls = 'timer-yellow';
    return `<span class="funeral-timer ${cls}">⏱ ${hrs}h ${mins}m para velacion</span>`;
  } catch(e) { return ''; }
}

// ─── Render card ───
function renderCard(p, showActions) {
  const pagoPendiente = !p.pago_confirmado;
  const pagoIcon = p.pago_confirmado ? '✅' : '⚠️ PENDIENTE';
  let badges = '';
  if (p.tipo_especial === 'Funeral') badges += '<span class="pedido-badge badge-funeral">FUNERAL</span>';
  else if (p.tipo_especial === 'Evento') badges += '<span class="pedido-badge badge-evento">EVENTO</span>';

  // Florista badges
  const ef = p.estado_florista || '';
  if (ef === 'aprobado_con_modificacion') badges += '<span class="badge-florista badge-esperando">ESPERANDO RESPUESTA CLIENTE</span>';
  else if (ef === 'cambio_sugerido') badges += '<span class="badge-florista badge-cambio">CAMBIO SUGERIDO — ESPERANDO CLIENTE</span>';
  else if (ef === 'rechazado') badges += '<span class="badge-florista badge-rechazado">RECHAZADO — REQUIERE INTERVENCION</span>';

  let actions = '';
  if (showActions) {
    const est = (p.estado||'').toLowerCase();
    const isPendienteAprobacion = !ef || ef === 'pendiente_aprobacion';
    const isAprobado = ef === 'aprobado' || ef === 'aprobado_con_modificacion';

    if (isPendienteAprobacion && !est.includes('listo') && !est.includes('entregado') && !est.includes('cancelado')) {
      actions += `<button class="action-btn btn-aceptar" onclick="aceptarPedido(${p.id})">✅ Aceptar</button>`;
      actions += `<button class="action-btn btn-modificar" onclick="abrirModificacion(${p.id})">⚠️ Modificar</button>`;
      actions += `<button class="action-btn btn-cambio" onclick="abrirCambio(${p.id})">🔄 Cambio</button>`;
      actions += `<button class="action-btn btn-rechazar" onclick="abrirRechazo(${p.id})">❌ Rechazar</button>`;
    }
    if (isAprobado && est.includes('producci')) {
      actions += `<button class="action-btn btn-listo" onclick="marcarListo(${p.id})">Listo ✓</button>`;
    }
    actions += `<button class="action-btn btn-imprimir" onclick="imprimirTicket(${p.id})">🖨</button>`;
  }

  const timer = funeralTimer(p);
  const notaFl = p.nota_florista ? `<div class="pedido-notas" style="border-left-color:var(--azul)">Nota florista: ${p.nota_florista}</div>` : '';

  // Product info from items
  let productoHtml = '';
  const items = p.items || [];
  if (items.length === 0) {
    productoHtml = '<div class="pedido-producto" style="color:var(--texto2);font-size:13px">Producto no especificado</div>';
  } else {
    for (const item of items) {
      if (item.es_personalizado) {
        productoHtml += `<div><span class="badge-personalizado">⚡ PERSONALIZADO</span></div>`;
        productoHtml += `<div class="pedido-producto">${item.nombre_personalizado || item.nombre}</div>`;
        if (item.observaciones) productoHtml += `<div class="pedido-producto-obs">${item.observaciones}</div>`;
      } else {
        productoHtml += `<div class="pedido-producto">${item.nombre}${item.codigo ? `<span class="pedido-producto-code">${item.codigo}</span>` : ''}${item.cantidad > 1 ? ` <span class="pedido-producto-code">x${item.cantidad}</span>` : ''} <button class="action-btn btn-foto" style="padding:2px 8px;font-size:11px;display:inline;vertical-align:middle" onclick="verFotos(${p.id},'${(p.numero||'').replace(/'/g,"\\'")}')">📷 Ver foto</button></div>`;
      }
    }
  }

  return `
  <div class="pedido-card ${pagoPendiente ? 'pago-pendiente' : ''}">
    ${pagoPendiente ? '<div class="pago-warn">⚠️ NO ELABORAR — PAGO PENDIENTE</div>' : ''}
    <div>${badges}</div>
    ${timer}
    <div class="pedido-header">
      <div class="pedido-num">${p.numero}</div>
      <span class="pedido-estado ${estadoClass(p.estado)}">${p.estado}</span>
    </div>
    ${productoHtml}
    <div class="pedido-receptor">${p.receptor_nombre || 'Sin receptor'}</div>
    ${p.zona_entrega ? `<div class="pedido-detail">📍 Zona ${p.zona_entrega} — ${p.direccion_entrega || ''}</div>` : ''}
    ${p.receptor_telefono ? `<div class="pedido-detail">📞 ${p.receptor_telefono}</div>` : ''}
    ${p.hora_exacta ? `<div class="pedido-detail">⏰ ${p.hora_exacta}</div>` : ''}
    ${p.dedicatoria ? `<div class="pedido-dedicatoria">"${p.dedicatoria}"</div>` : ''}
    ${p.notas_internas ? `<div class="pedido-notas">${p.notas_internas}</div>` : ''}
    ${notaFl}
    <div class="pedido-pago">${p.forma_pago || 'Sin info'} ${pagoIcon} — Total: $${(p.total||0)/100}</div>
    ${actions ? `<div class="pedido-actions">${actions}</div>` : ''}
  </div>`;
}

function renderBuckets(pedidos, containerId) {
  const buckets = {manana:[], tarde:[], noche:[], tienda:[]};
  pedidos.forEach(p => buckets[classify(p)].push(p));
  const labels = {manana:'🌅 Manana (9am - 2pm)', tarde:'🌞 Tarde (2pm - 6pm)', noche:'🌙 Noche (6pm - 9pm)', tienda:'🏪 Recoger en tienda'};
  let html = '';
  for (const [key, items] of Object.entries(buckets)) {
    html += `<div class="section">
      <div class="section-title">${labels[key]} <span class="section-count">${items.length}</span></div>
      <div class="pedidos-grid">${items.length ? items.map(p => renderCard(p, true)).join('') : '<div class="empty">Sin pedidos</div>'}</div>
    </div>`;
  }
  return html;
}

// ─── Load Pedidos (hoy + manana) ───
async function loadPedidos() {
  try {
    const [rHoy, rManana] = await Promise.all([
      fetch(`${API}/pedidos/hoy`, {credentials:'include'}),
      fetch(`${API}/pedidos/manana`, {credentials:'include'})
    ]);
    if (rHoy.status === 401) { window.location.href = '/panel/'; return; }
    const pedidosHoy = rHoy.ok ? await rHoy.json() : [];
    const pedidosManana = rManana.ok ? await rManana.json() : [];

    // Notification badge
    const pendientes = pedidosHoy.filter(p => !p.estado_florista || p.estado_florista === 'pendiente_aprobacion').length
      + pedidosManana.filter(p => !p.estado_florista || p.estado_florista === 'pendiente_aprobacion').length;
    const badge = document.getElementById('notif-badge');
    if (pendientes > 0) { badge.textContent = pendientes; badge.style.display = ''; }
    else { badge.style.display = 'none'; }

    // Check for new
    if (prevCountHoy >= 0 && pedidosHoy.length > prevCountHoy) {
      badge.style.display = '';
    }
    prevCountHoy = pedidosHoy.length;

    document.getElementById('pedidos-hoy').innerHTML = '<div class="day-label">Hoy</div>' + renderBuckets(pedidosHoy, 'pedidos-hoy');
    document.getElementById('pedidos-manana').innerHTML = pedidosManana.length
      ? '<div class="day-label">Manana</div>' + renderBuckets(pedidosManana, 'pedidos-manana')
      : '';
  } catch(e) { console.error(e); }
}

}

const invExpanded = new Set(); // tracks expanded section keys

function toggleInvSection(key) {
  if (invExpanded.has(key)) invExpanded.delete(key);
  else invExpanded.add(key);
  document.querySelectorAll(`[data-inv-key="${key}"]`).forEach(el => {
    el.classList.toggle('collapsed', !invExpanded.has(key));
  });
}

async function loadInventario() {
  await Promise.all([loadInvFloral(), loadInvNoFloral()]);
}

const statusOpts = ['en_stock','stock_bajo','sin_stock'];
const statusLabels = {'en_stock':'🟢 En stock','stock_bajo':'🟡 Stock bajo','sin_stock':'🔴 Sin stock'};

function renderStatusSelect(id, tipo, current) {
  return `<select onchange="updateInvStatus(${id},'${tipo}',this.value)">
    ${statusOpts.map(s => `<option value="${s}" ${current===s?'selected':''}>${statusLabels[s]}</option>`).join('')}
  </select>`;
}

async function loadInvFloral() {
  try {
    const r = await fetch(`${API}/inventario/floral`, {credentials:'include'});
    if (!r.ok) return;
    const items = await r.json();

    const principales = items.filter(i => i.categoria === 'principal');
    const otras = items.filter(i => i.categoria === 'otras_flores');
    const follajes = items.filter(i => i.categoria === 'follajes');

    const familias = {};
    principales.forEach(i => {
      if (!familias[i.familia]) familias[i.familia] = [];
      familias[i.familia].push(i);
    });

    let html = '';

    // ── Flores Principales ──
    const kPrinc = 'fl-principales';
    html += `<div class="inv-section">
      <div class="inv-header" onclick="toggleInvSection('${kPrinc}')">
        Flores Principales (${Object.keys(familias).length} familias) <span>▾</span>
      </div>
      <div class="inv-body ${invExpanded.has(kPrinc)?'':'collapsed'}" data-inv-key="${kPrinc}">`;

    for (const [familia, colors] of Object.entries(familias)) {
      const hasColors = colors.length > 1 || (colors.length === 1 && colors[0].variante);
      if (hasColors) {
        const kFam = 'fam-' + familia.replace(/[^a-zA-Z0-9]/g,'_');
        html += `<div class="inv-row inv-family" onclick="toggleInvSection('${kFam}')" style="cursor:pointer;background:var(--crema)">
          <div class="inv-name" style="font-weight:600">${familia} <span class="auto-badge">⚡</span></div>
          <div style="font-size:12px;color:var(--texto2)">${colors.length} colores ▸</div>
        </div>
        <div class="inv-colors ${invExpanded.has(kFam)?'':'collapsed'}" data-inv-key="${kFam}">`;
        for (const c of colors) {
          html += `<div class="inv-row" style="padding-left:32px">
            <div class="inv-name">${c.variante || familia}</div>
            <div class="inv-qty">
              <button onclick="event.stopPropagation();updateInvQty(${c.id},'floral',${c.cantidad - 1})">−</button>
              <span>${c.cantidad}</span>
              <button onclick="event.stopPropagation();updateInvQty(${c.id},'floral',${c.cantidad + 1})">+</button>
            </div>
            <div class="inv-status">${renderStatusSelect(c.id, 'floral', c.stock_estado)}</div>
          </div>`;
        }
        html += '</div>';
      } else {
        const c = colors[0];
        html += `<div class="inv-row">
          <div class="inv-name">${familia} <span class="auto-badge">⚡</span></div>
          <div class="inv-qty">
            <button onclick="updateInvQty(${c.id},'floral',${c.cantidad - 1})">−</button>
            <span>${c.cantidad}</span>
            <button onclick="updateInvQty(${c.id},'floral',${c.cantidad + 1})">+</button>
          </div>
          <div class="inv-status">${renderStatusSelect(c.id, 'floral', c.stock_estado)}</div>
        </div>`;
      }
    }
    html += '</div></div>';

    // ── Otras Flores ──
    const kOtras = 'fl-otras';
    html += `<div class="inv-section">
      <div class="inv-header" onclick="toggleInvSection('${kOtras}')">
        Otras Flores (${otras.length}) <span>▾</span>
      </div>
      <div class="inv-body ${invExpanded.has(kOtras)?'':'collapsed'}" data-inv-key="${kOtras}">`;
    for (const i of otras) {
      html += `<div class="inv-row">
        <div class="inv-name" style="flex:1">${i.familia}</div>
        <div class="inv-status">${renderStatusSelect(i.id, 'floral', i.stock_estado)}</div>
      </div>`;
    }
    html += '</div></div>';

    // ── Follajes ──
    const kFoll = 'fl-follajes';
    html += `<div class="inv-section">
      <div class="inv-header" onclick="toggleInvSection('${kFoll}')">
        Follajes (${follajes.length}) <span>▾</span>
      </div>
      <div class="inv-body ${invExpanded.has(kFoll)?'':'collapsed'}" data-inv-key="${kFoll}">`;
    for (const i of follajes) {
      html += `<div class="inv-row">
        <div class="inv-name" style="flex:1">${i.familia}</div>
        <div class="inv-status">${renderStatusSelect(i.id, 'floral', i.stock_estado)}</div>
      </div>`;
    }
    html += '</div></div>';

    document.getElementById('inv-floral').innerHTML = html;
  } catch(e) { console.error(e); }
}

async function loadInvNoFloral() {
  try {
    const r = await fetch(`${API}/inventario/no-floral`, {credentials:'include'});
    if (!r.ok) return;
    const items = await r.json();
    const groups = {};
    items.forEach(i => { if (!groups[i.categoria]) groups[i.categoria] = []; groups[i.categoria].push(i); });
    let html = '';
    for (const [cat, list] of Object.entries(groups)) {
      const kNf = 'nf-' + cat.replace(/[^a-zA-Z0-9]/g,'_');
      html += `<div class="inv-section">
        <div class="inv-header" onclick="toggleInvSection('${kNf}')">
          ${cat} (${list.length}) <span>▾</span>
        </div>
        <div class="inv-body ${invExpanded.has(kNf)?'':'collapsed'}" data-inv-key="${kNf}">`;
      for (const i of list) {
        const nombre = i.variante ? `${cat} — ${i.variante}` : cat;
        html += `<div class="inv-row">
          <div class="inv-name">${nombre}</div>
          <div class="inv-qty">
            <button onclick="updateInvQty(${i.id},'no-floral',${i.cantidad - 1})">−</button>
            <span>${i.cantidad}</span>
            <button onclick="updateInvQty(${i.id},'no-floral',${i.cantidad + 1})">+</button>
          </div>
          <div class="inv-status">${renderStatusSelect(i.id, 'no-floral', i.stock_estado)}</div>
        </div>`;
      }
      html += '</div></div>';
    }
    document.getElementById('inv-no-floral').innerHTML = html;
  } catch(e) {}
}

async function updateInvQty(id, tipo, newQty) {
  if (newQty < 0) newQty = 0;
  try {
    await fetch(`${API}/inventario/${tipo}/${id}`, {

      body: JSON.stringify({cantidad: newQty})

}

async function updateInvStatus(id, tipo, status) {
  try {

      body: JSON.stringify({stock_estado: status})

  } catch(e) {}
}

function buscarProductos() {
  const q = document.getElementById('cambio-buscar').value.toLowerCase().trim();
  if (q.length < 2) { document.getElementById('cambio-results').innerHTML = ''; return; }
  const matches = allProductos.filter(p => p.nombre.toLowerCase().includes(q) || (p.codigo||'').toLowerCase().includes(q)).slice(0, 10);
  document.getElementById('cambio-results').innerHTML = matches.map(p =>
    `<div class="search-item ${selectedProducto && selectedProducto.id===p.id ? 'selected':''}" onclick="seleccionarProducto(${p.id},'${p.nombre.replace(/'/g,"\\'")}','${(p.codigo||'').replace(/'/g,"\\'")}')">

    </div>`
  ).join('') || '<div class="search-item" style="color:var(--texto2)">Sin resultados</div>';
}

  const body = document.getElementById('foto-modal-body');
  document.getElementById('foto-modal-title').textContent = `Productos — ${numero}`;
  body.innerHTML = '<div class="producto-sin-foto">Cargando...</div>';
  document.getElementById('foto-modal').classList.add('active');
  try {
    const r = await fetch(`${API}/pedidos/${pedidoId}/items`, {credentials:'include'});
    if (!r.ok) { body.innerHTML = '<div class="producto-sin-foto">Error al cargar</div>'; return; }
    const items = await r.json();
    if (!items.length) { body.innerHTML = '<div class="producto-sin-foto">Sin productos asociados</div>'; return; }
    body.innerHTML = items.map(item => {
      const img = item.imagen_url
        ? `<img class="producto-img" src="${item.imagen_url}" alt="${item.nombre}" onerror="this.outerHTML='<div class=\\'producto-sin-foto\\'>Sin foto disponible</div>'">`
        : '<div class="producto-sin-foto">Sin foto disponible</div>';
      return `<div class="producto-item">${img}<div class="producto-nombre">${item.nombre}${item.cantidad>1?` (x${item.cantidad})`:''}</div>${item.codigo?`<div class="producto-codigo">Codigo: ${item.codigo}</div>`:''}</div>`;
    }).join('');
  } catch(e) { body.innerHTML = '<div class="producto-sin-foto">Error al cargar</div>'; }
}

// ─── Imprimir ticket ───
async function imprimirTicket(id) {
  try {
    const r = await fetch(`${API}/pedidos/${id}`, {credentials:'include'});
    if (!r.ok) return;
    const p = await r.json();
    const fecha = p.fecha_entrega ? new Date(p.fecha_entrega+'T12:00:00').toLocaleDateString('es-MX') : '';
    const hora = new Date().toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit',timeZone:'America/Chihuahua'});
    const total = `$${(p.total||0)/100}`;
    const pagoStatus = p.pago_confirmado ? 'CONFIRMADO' : 'PENDIENTE';
    const horarioMap = {manana:'Manana 9-2pm','mañana':'Manana 9-2pm',tarde:'Tarde 2-6pm',noche:'Noche 6-9pm'};
    const horarioLabel = horarioMap[(p.horario_entrega||'').toLowerCase()] || p.horario_entrega || '';
    const recoger = !p.direccion_entrega && !p.zona_entrega;

    let lines = [];
    lines.push('<div class="dsep"></div>');
    lines.push('<div class="tline"><strong>FLORERIA LUCY</strong></div>');
    lines.push('<div class="tline">La expresion del amor</div>');
    lines.push('<div class="tline">Tel: 614 334 9392</div>');
    lines.push('<div class="dsep"></div>');
    if (p.tipo_especial === 'Funeral') {
      lines.push('<div><strong>*** PEDIDO FUNERAL ***</strong></div>');
      if (p.notas_internas) lines.push(`<div>${p.notas_internas}</div>`);
      lines.push('<div class="sep"></div>');
    }
    lines.push(`<div>Pedido: <strong>${p.numero}</strong></div>`);
    lines.push(`<div>Fecha:  ${fecha}</div>`);
    lines.push(`<div>Hora:   ${hora}</div>`);
    if (recoger) {
      lines.push('<div class="sep"></div>');
      lines.push('<div><strong>MODALIDAD: RECOGER EN TIENDA</strong></div>');
      if (p.hora_exacta) lines.push(`<div>Hora aprox: ${p.hora_exacta}</div>`);
      lines.push('<div class="sep"></div>');
      lines.push(`<div>CLIENTE: ${p.receptor_nombre||''}</div>`);
      if (p.receptor_telefono) lines.push(`<div>TEL: ${p.receptor_telefono}</div>`);
    } else {
      lines.push('<div class="sep"></div>');
      lines.push(`<div>HORARIO ENTREGA: ${horarioLabel}</div>`);
      if (p.hora_exacta) lines.push(`<div>HORA EXACTA: ${p.hora_exacta}</div>`);
      if (p.zona_entrega) lines.push(`<div>ZONA: ${p.zona_entrega}</div>`);
      lines.push('<div class="sep"></div>');
      lines.push(`<div>RECIBE: ${p.receptor_nombre||''}</div>`);
      if (p.receptor_telefono) lines.push(`<div>TEL:    ${p.receptor_telefono}</div>`);
      if (p.direccion_entrega) lines.push(`<div>DIR:    ${p.direccion_entrega}</div>`);
    }
    if (p.dedicatoria) {
      lines.push('<div class="sep"></div>');
      lines.push('<div>DEDICATORIA:</div>');
      lines.push(`<div>"${p.dedicatoria}"</div>`);
    }
    if (p.notas_internas && p.tipo_especial !== 'Funeral') {
      lines.push('<div class="sep"></div>');
      lines.push('<div>NOTAS:</div>');
      lines.push(`<div>${p.notas_internas}</div>`);
    }
    lines.push('<div class="sep"></div>');
    lines.push(`<div>PAGO: ${p.forma_pago||''} ${pagoStatus}</div>`);
    lines.push(`<div>TOTAL: <strong>${total}</strong></div>`);
    lines.push('<div class="dsep"></div>');
    lines.push('<div class="tline">Gracias por su preferencia</div>');
    lines.push('<div class="dsep"></div>');
    document.getElementById('print-frame').innerHTML = lines.join('\n');
    setTimeout(() => window.print(), 100);
  } catch(e) { alert('Error al cargar pedido'); }
}

async function imprimirEtiqueta(id) {
  try {
    const r = await fetch(`${API}/pedidos/${id}`, {credentials:'include'});
    if (!r.ok) return;
    const p = await r.json();
    const recoger = !p.direccion_entrega && !p.zona_entrega;
    let lines = [];
    lines.push('<div class="dsep"></div>');
    lines.push(`<div class="tline"><strong>${p.numero}</strong></div>`);
    lines.push('<div class="dsep"></div>');
    if (recoger) {
      lines.push('<div><strong>RECOGER EN TIENDA</strong></div>');
      lines.push(`<div>${p.receptor_nombre||''}</div>`);
    } else {
      lines.push(`<div>ZONA: ${p.zona_entrega||''}</div>`);
      lines.push(`<div>RECIBE: ${p.receptor_nombre||''}</div>`);
      if (p.direccion_entrega) lines.push(`<div>DIR: ${p.direccion_entrega}</div>`);
      if (p.receptor_telefono) lines.push(`<div>TEL: ${p.receptor_telefono}</div>`);
      const horarioMap = {manana:'Manana','mañana':'Manana',tarde:'Tarde',noche:'Noche'};
      lines.push(`<div>HORARIO: ${horarioMap[(p.horario_entrega||'').toLowerCase()]||p.horario_entrega||''}</div>`);
    }
    lines.push('<div class="dsep"></div>');
    document.getElementById('print-frame').innerHTML = lines.join('\n');
    setTimeout(() => window.print(), 100);
  } catch(e) { alert('Error al cargar pedido'); }
}
